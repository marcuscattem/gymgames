<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GymGames · Simulação Olímpica</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800;900&family=Saira+Condensed:wght@500;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      color-scheme: light;
      --bg:#f2efe6; --bg-2:#e8e2d3; --text:#181b1c; --muted:#5f6669;
      --surface:#fffdf8; --surface-2:#f5f1e6; --surface-3:#efe9da;
      --line:#ddd6c6; --strong-line:#c3b9a4;
      --accent:#0e6d66; --accent-soft:#0e6d661a; --accent-2:#c2410c; --accent-3:#a67c00;
      --good:#15803d; --bad:#b3261e;
      --gold:#c99700; --silver:#98a2ac; --bronze:#b06a2c;
      --shadow:0 20px 60px rgba(58,47,28,.12); --shadow-sm:0 2px 10px rgba(58,47,28,.08);
      --radius:12px; --radius-sm:9px;
      --disp:"Saira Condensed",system-ui,sans-serif;
      --ui:"Archivo",ui-sans-serif,system-ui,sans-serif;
    }
    :root[data-theme="dark"] {
      color-scheme: dark;
      --bg:#0f1211; --bg-2:#141817; --text:#f0ede4; --muted:#a7a293;
      --surface:#1b201e; --surface-2:#222824; --surface-3:#29302b;
      --line:#39403a; --strong-line:#565f57;
      --accent:#37c9b8; --accent-soft:#37c9b826; --accent-2:#fb7b45; --accent-3:#f0c65a;
      --good:#4ade80; --bad:#f6817a;
      --gold:#f0c24e; --silver:#c6ccd4; --bronze:#d08a4a;
      --shadow:0 20px 60px rgba(0,0,0,.32); --shadow-sm:0 2px 10px rgba(0,0,0,.28);
    }
    * { box-sizing:border-box; }
    body { margin:0; min-height:100vh; background:linear-gradient(180deg,var(--bg),var(--bg-2)); color:var(--text); font-family:var(--ui); -webkit-font-smoothing:antialiased; }
    button,input,select { font:inherit; color:inherit; }
    button { cursor:pointer; }
    button:focus-visible,input:focus-visible,select:focus-visible { outline:3px solid color-mix(in srgb,var(--accent) 45%,transparent); outline-offset:2px; }
    .shell { min-height:100vh; display:flex; flex-direction:column; }

    /* topbar */
    .topbar { position:sticky; top:0; z-index:50; background:color-mix(in srgb,var(--surface) 86%,transparent); border-bottom:1px solid var(--line); backdrop-filter:blur(14px); }
    .brand-mark { width:38px; height:38px; border:1px solid var(--strong-line); border-radius:10px; display:grid; place-items:center; color:var(--accent); background:linear-gradient(135deg,var(--accent-soft),transparent 60%),var(--surface-2); }
    .brand-mark svg { width:23px; height:23px; }
    .brand-title { font-family:var(--disp); font-weight:800; letter-spacing:.01em; }
    .status-pill { min-height:34px; display:inline-flex; align-items:center; gap:8px; border:1px solid var(--line); background:var(--surface-2); border-radius:999px; padding:5px 12px; font-size:13px; font-weight:700; white-space:nowrap; }
    .status-pill svg { width:16px; height:16px; }

    .screen { width:min(1200px,calc(100vw - 24px)); margin:0 auto; padding:26px 0 48px; animation:screen-in 200ms ease-out; }
    @keyframes screen-in { from{transform:translateY(7px);} to{transform:none;} }

    .panel { background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); box-shadow:var(--shadow); }
    .soft-panel { background:color-mix(in srgb,var(--surface) 74%,transparent); border:1px solid var(--line); border-radius:var(--radius); }
    .card { background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); }

    /* type */
    .display { font-family:var(--disp); font-weight:800; line-height:1.02; letter-spacing:.005em; text-wrap:balance; }
    .kicker { font-size:12px; font-weight:800; letter-spacing:.14em; text-transform:uppercase; color:var(--accent); }
    .section-title { font-family:var(--disp); font-weight:700; font-size:19px; display:flex; align-items:center; gap:8px; }
    .section-title svg { width:18px; height:18px; color:var(--muted); }
    .hint { font-size:14px; font-weight:600; color:var(--muted); }
    .sub { font-size:12px; font-weight:700; color:var(--muted); }
    .strong { font-weight:800; }
    .count-pill { font-family:var(--disp); font-size:15px; color:var(--muted); }

    /* fields */
    .field { display:grid; gap:7px; }
    .field-label { font-size:12.5px; font-weight:800; letter-spacing:.08em; text-transform:uppercase; color:var(--muted); }
    .input { width:100%; min-height:46px; border:1px solid var(--line); border-radius:var(--radius-sm); background:var(--surface); padding:10px 13px; font-weight:600; }
    .language-select { width:auto; min-width:150px; min-height:42px; border:1px solid var(--line); border-radius:var(--radius-sm); background:var(--surface); padding:8px 12px; font-weight:800; }

    /* buttons */
    .btn { min-height:44px; display:inline-flex; align-items:center; justify-content:center; gap:8px; border-radius:var(--radius-sm); border:1px solid transparent; padding:9px 15px; font-weight:800; letter-spacing:.01em; transition:transform .13s ease, background-color .13s ease, border-color .13s ease, box-shadow .13s ease; white-space:nowrap; }
    .btn svg { width:18px; height:18px; }
    .btn:hover { transform:translateY(-1px); }
    .btn:active { transform:translateY(0); }
    .btn:disabled { cursor:not-allowed; opacity:.5; transform:none; }
    .btn-primary { background:var(--accent); color:#fff; box-shadow:var(--shadow-sm); }
    :root[data-theme="dark"] .btn-primary { color:#04120f; }
    .btn-primary:hover { background:color-mix(in srgb,var(--accent) 88%,#000); }
    .btn-secondary { background:var(--surface-2); border-color:var(--line); }
    .btn-secondary:hover { border-color:var(--strong-line); }
    .btn-danger { background:color-mix(in srgb,var(--bad) 10%,var(--surface)); color:var(--bad); border-color:color-mix(in srgb,var(--bad) 28%,var(--line)); }
    .btn-icon { width:44px; min-width:44px; padding:0; }

    /* segment */
    .segment { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:8px; padding:6px; background:var(--surface-2); border:1px solid var(--line); border-radius:var(--radius-sm); }
    .segment button { min-height:48px; border-radius:8px; border:1px solid transparent; font-weight:900; color:var(--muted); display:flex; align-items:center; justify-content:center; gap:9px; background:transparent; }
    .segment button .seg-ico { display:inline-grid; place-items:center; color:currentColor; }
    .segment button.active { background:var(--surface); border-color:var(--strong-line); color:var(--text); box-shadow:var(--shadow-sm); }
    .segment button.active .seg-ico { color:var(--accent); }
    .competition-segment { grid-template-columns:repeat(2,minmax(0,1fr)); }
    .competition-segment button { min-height:54px; padding:8px 10px; white-space:normal; line-height:1.15; }

    /* chips + app icons */
    .chip { min-height:32px; display:inline-flex; align-items:center; gap:7px; border:1px solid var(--line); background:var(--surface-2); border-radius:999px; padding:5px 12px; font-size:13px; font-weight:700; white-space:nowrap; }
    .chip-app { padding-left:6px; }
    .app-icon { width:30px; height:30px; border:1px solid var(--line); border-radius:8px; display:inline-grid; place-items:center; color:var(--accent); background:var(--surface); flex:0 0 auto; }
    .app-icon svg { width:19px; height:19px; }
    .app-icon-sm { width:24px; height:24px; border-radius:7px; } .app-icon-sm svg { width:15px; height:15px; }
    .app-icon-xs { width:20px; height:20px; border-radius:6px; } .app-icon-xs svg { width:13px; height:13px; }

    /* metrics */
    .metric { border:1px solid var(--line); background:var(--surface-2); border-radius:var(--radius-sm); padding:14px; }
    .metric-num { font-family:var(--disp); font-weight:800; font-size:26px; line-height:1; }
    .metric-cap { margin-top:5px; font-size:13px; font-weight:700; color:var(--muted); }
    .metric-app .metric-top { display:flex; align-items:center; justify-content:space-between; gap:8px; }
    .metric-app .metric-cap { margin-top:9px; font-size:12.5px; }
    .metric-sub { margin-top:2px; font-size:11.5px; font-weight:700; color:var(--muted); }

    .score { font-family:var(--disp); font-variant-numeric:tabular-nums; font-weight:800; text-align:right; font-size:15px; }
    .score-lg { font-family:var(--disp); font-variant-numeric:tabular-nums; font-weight:900; font-size:30px; color:var(--accent); }

    /* roster */
    .roster-card { padding:12px; }
    .slot-empty { display:flex; align-items:center; gap:8px; border:1px dashed var(--strong-line); border-radius:var(--radius-sm); padding:13px; font-size:13px; font-weight:700; color:var(--muted); }
    .slot-empty svg { width:15px; height:15px; }
    .roster-mini { border-radius:var(--radius-sm); }
    .confirm-card { display:flex; align-items:center; gap:16px; }
    .confirm-ico { width:52px; height:52px; border-radius:14px; display:grid; place-items:center; background:var(--accent-soft); color:var(--accent); }
    .confirm-ico svg { width:26px; height:26px; }

    /* tables */
    .table-wrap { overflow:auto; border:1px solid var(--line); border-radius:var(--radius-sm); background:var(--surface); }
    .table-wrap.tall { max-height:700px; } .table-wrap.mid { max-height:360px; }
    table { width:100%; border-collapse:collapse; min-width:720px; }
    th { position:sticky; top:0; z-index:1; background:var(--surface-2); color:var(--muted); font-size:11px; letter-spacing:.06em; text-transform:uppercase; text-align:left; padding:11px 12px; border-bottom:1px solid var(--line); white-space:nowrap; font-weight:800; }
    th.num, td.num { text-align:right; } th.ctr, td.ctr { text-align:center; }
    .th-app { display:inline-flex; align-items:center; gap:5px; justify-content:flex-end; } .th-app svg { color:var(--accent); }
    td { padding:11px 12px; border-bottom:1px solid var(--line); vertical-align:middle; white-space:nowrap; font-size:14px; }
    tr:last-child td { border-bottom:0; }
    tbody tr:hover { background:color-mix(in srgb,var(--accent) 6%,transparent); }
    td.rank { width:36px; color:var(--muted); font-family:var(--disp); font-weight:800; font-variant-numeric:tabular-nums; }
    .player-row td { background:var(--accent-soft) !important; box-shadow:inset 3px 0 0 var(--accent); }
    .qrow td { background:color-mix(in srgb,var(--good) 6%,transparent); }
    .q-badge { min-width:26px; height:24px; border-radius:999px; display:inline-flex; align-items:center; justify-content:center; font-size:12px; font-weight:900; color:var(--good); background:color-mix(in srgb,var(--good) 12%,transparent); border:1px solid color-mix(in srgb,var(--good) 30%,var(--line)); }
    .medal-h-g { color:var(--gold); } .medal-h-s { color:var(--silver); } .medal-h-b { color:var(--bronze); }

    .medal-badge { min-width:26px; height:26px; border-radius:999px; display:inline-flex; align-items:center; justify-content:center; font-family:var(--disp); font-size:13px; font-weight:900; border:1px solid; box-shadow:inset 0 1.5px 0 rgba(255,255,255,.55), inset 0 -2px 4px rgba(0,0,0,.18), 0 1px 3px rgba(0,0,0,.15); }
    .medal-gold { color:#2e2100; border-color:color-mix(in srgb,var(--gold) 68%,#000); background:radial-gradient(circle at 35% 30%, color-mix(in srgb,var(--gold) 45%,#fff), var(--gold) 62%, color-mix(in srgb,var(--gold) 72%,#000)); }
    .medal-silver { color:#1f2933; border-color:color-mix(in srgb,var(--silver) 68%,#000); background:radial-gradient(circle at 35% 30%, color-mix(in srgb,var(--silver) 45%,#fff), var(--silver) 62%, color-mix(in srgb,var(--silver) 72%,#000)); }
    .medal-bronze { color:#2c1607; border-color:color-mix(in srgb,var(--bronze) 68%,#000); background:radial-gradient(circle at 35% 30%, color-mix(in srgb,var(--bronze) 45%,#fff), var(--bronze) 62%, color-mix(in srgb,var(--bronze) 72%,#000)); }

    /* tabbar */
    .tabbar { display:flex; flex-wrap:wrap; gap:8px; }
    .tabbar button { min-height:40px; border:1px solid var(--line); border-radius:var(--radius-sm); padding:8px 14px; color:var(--muted); font-weight:800; background:var(--surface-2); display:inline-flex; align-items:center; gap:7px; }
    .tabbar button svg { width:16px; height:16px; }
    .tabbar button.active { color:var(--text); border-color:var(--strong-line); background:var(--surface); }
    .tabbar button.active svg { color:var(--accent); }

    /* podium */
    .podium { display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); align-items:end; gap:12px; min-height:270px; }
    .podium-place { display:grid; align-content:end; min-width:0; }
    .podium-name { min-height:56px; display:grid; align-content:end; justify-items:center; text-align:center; font-family:var(--disp); font-weight:800; line-height:1.1; font-size:17px; overflow-wrap:anywhere; }
    .podium-sub { margin-top:3px; font-family:var(--ui); font-size:11.5px; font-weight:700; color:var(--muted); }
    .podium-you { margin-top:3px; font-family:var(--ui); font-size:11px; font-weight:800; color:var(--accent); }
    .podium-block { position:relative; margin-top:26px; border-radius:10px 10px 0 0; display:grid; align-content:end; justify-items:center; gap:2px; padding:10px 8px 13px; min-height:92px; transform-origin:bottom; animation:podium-rise .55s cubic-bezier(.2,.9,.25,1) backwards; box-shadow:inset 0 2px 0 rgba(255,255,255,.45), inset 0 -18px 28px rgba(0,0,0,.14), 0 12px 26px rgba(58,47,28,.16); }
    @keyframes podium-rise { from { transform:scaleY(.25); opacity:0; } to { transform:none; opacity:1; } }
    .podium-medal { position:absolute; top:-19px; left:50%; transform:translateX(-50%); width:38px; height:38px; border-radius:999px; display:grid; place-items:center; font-family:var(--disp); font-weight:900; font-size:17px; border:2px solid; box-shadow:0 5px 12px rgba(0,0,0,.25), inset 0 2px 0 rgba(255,255,255,.55), inset 0 -3px 6px rgba(0,0,0,.2); }
    .podium-score { font-family:var(--disp); font-weight:900; font-variant-numeric:tabular-nums; font-size:22px; line-height:1; }
    .podium-place:nth-child(1){order:2;} .podium-place:nth-child(2){order:1;} .podium-place:nth-child(3){order:3;}
    .podium-place:nth-child(1) .podium-block{ min-height:150px; animation-delay:.28s; color:#2e2100; background:linear-gradient(180deg, color-mix(in srgb,var(--gold) 58%,#fff), var(--gold) 42%, color-mix(in srgb,var(--gold) 72%,#000)); box-shadow:inset 0 2px 0 rgba(255,255,255,.5), inset 0 -18px 28px rgba(0,0,0,.14), 0 12px 26px rgba(58,47,28,.16), 0 0 46px color-mix(in srgb,var(--gold) 32%,transparent); }
    .podium-place:nth-child(2) .podium-block{ min-height:116px; animation-delay:.14s; color:#1f2933; background:linear-gradient(180deg, color-mix(in srgb,var(--silver) 58%,#fff), var(--silver) 42%, color-mix(in srgb,var(--silver) 72%,#000)); }
    .podium-place:nth-child(3) .podium-block{ min-height:96px; color:#2c1607; background:linear-gradient(180deg, color-mix(in srgb,var(--bronze) 58%,#fff), var(--bronze) 42%, color-mix(in srgb,var(--bronze) 72%,#000)); }
    .podium-place:nth-child(1) .podium-medal{ color:#2e2100; border-color:color-mix(in srgb,var(--gold) 62%,#000); background:radial-gradient(circle at 35% 30%, color-mix(in srgb,var(--gold) 45%,#fff), var(--gold) 62%, color-mix(in srgb,var(--gold) 72%,#000)); }
    .podium-place:nth-child(2) .podium-medal{ color:#1f2933; border-color:color-mix(in srgb,var(--silver) 62%,#000); background:radial-gradient(circle at 35% 30%, color-mix(in srgb,var(--silver) 45%,#fff), var(--silver) 62%, color-mix(in srgb,var(--silver) 72%,#000)); }
    .podium-place:nth-child(3) .podium-medal{ color:#2c1607; border-color:color-mix(in srgb,var(--bronze) 62%,#000); background:radial-gradient(circle at 35% 30%, color-mix(in srgb,var(--bronze) 45%,#fff), var(--bronze) 62%, color-mix(in srgb,var(--bronze) 72%,#000)); }
    .podium.compact { min-height:206px; } .podium.compact .podium-name{ font-size:14px; min-height:44px; } .podium.compact .podium-block{ min-height:72px; margin-top:22px; } .podium.compact .podium-medal{ width:32px; height:32px; font-size:14px; top:-16px; } .podium.compact .podium-score{ font-size:18px; } .podium.compact .podium-place:nth-child(1) .podium-block{min-height:108px;} .podium.compact .podium-place:nth-child(2) .podium-block{min-height:88px;}

    /* medal tally + haul */
    .medal-haul { display:flex; align-items:center; justify-content:space-between; gap:10px; padding:11px 13px; border:1px solid color-mix(in srgb,var(--accent) 30%,var(--line)); border-radius:var(--radius-sm); background:var(--accent-soft); }
    .haul-label { font-size:13px; font-weight:800; }
    .haul-set { display:flex; gap:7px; }
    .medal-haul .medal-badge { min-width:30px; height:30px; font-size:14px; }
    .tally-head { display:grid; grid-template-columns:22px 1fr 34px 34px 34px 48px; gap:8px; padding:0 12px; margin-bottom:6px; font-size:11px; font-weight:800; letter-spacing:.06em; text-transform:uppercase; color:var(--muted); }
    .tally-head .tally-h { text-align:center; }
    .tally-list { display:grid; gap:6px; }
    .tally-row { display:grid; grid-template-columns:22px 1fr 34px 34px 34px 48px; align-items:center; gap:8px; padding:10px 12px; border:1px solid var(--line); border-radius:var(--radius-sm); background:var(--surface-2); }
    .tally-rank { font-family:var(--disp); font-weight:900; color:var(--muted); font-variant-numeric:tabular-nums; }
    .tally-country { font-weight:800; font-size:14px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .tally-num { font-family:var(--disp); font-weight:800; font-size:15px; font-variant-numeric:tabular-nums; text-align:center; }
    .tally-total { font-weight:900; }
    .tally-top { border-color:color-mix(in srgb,var(--gold) 55%,var(--line)); background:linear-gradient(90deg,color-mix(in srgb,var(--gold) 16%,transparent),transparent 65%),var(--surface); }
    .tally-top .tally-rank { color:var(--gold); }
    .tally-you { border-color:color-mix(in srgb,var(--accent) 40%,var(--line)); background:var(--accent-soft); box-shadow:inset 3px 0 0 var(--accent); }

    /* medal sessions + flags */
    .sess-card { overflow:hidden; }
    .sess-head { display:flex; align-items:center; gap:8px; padding:11px 14px; border-bottom:1px solid var(--line); background:var(--surface-2); font-family:var(--disp); font-weight:800; font-size:16px; }
    .sess-head svg { width:17px; height:17px; color:var(--accent); flex:0 0 auto; }
    .sess-list { padding:8px; display:grid; gap:4px; }
    .sess-row { display:grid; grid-template-columns:26px 1fr auto auto; align-items:center; gap:10px; padding:8px 10px; border-radius:8px; }
    .sess-row:hover { background:var(--surface-2); }
    .sess-you { background:var(--accent-soft); box-shadow:inset 3px 0 0 var(--accent); }
    .sess-you:hover { background:var(--accent-soft); }
    .sess-name { font-weight:800; font-size:13.5px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .sess-score { font-family:var(--disp); font-weight:800; font-variant-numeric:tabular-nums; font-size:14px; }
    .country-tag { display:inline-flex; align-items:center; gap:6px; font-weight:800; white-space:nowrap; }
    .flag-img { width:21px; height:15px; object-fit:cover; border-radius:3px; border:1px solid var(--line); box-shadow:0 1px 2px rgba(0,0,0,.12); flex:0 0 auto; }
    .flag-custom { display:inline-grid; place-items:center; width:21px; height:15px; border-radius:3px; border:1px solid color-mix(in srgb,var(--accent) 40%,var(--line)); background:var(--accent-soft); color:var(--accent); flex:0 0 auto; }
    .flag-custom svg { width:10px; height:10px; }
    .tally-country { display:inline-flex; align-items:center; gap:7px; }
    .sub-fed { display:inline-flex; align-items:center; gap:6px; }
    .sub-fed .flag-img, .sub-fed .flag-custom { width:18px; height:13px; }
    .stand-fed { display:inline-flex; align-items:center; gap:5px; }
    .stand-fed .flag-img, .stand-fed .flag-custom { width:18px; height:13px; }
    .spot-meta .flag-img, .spot-meta .flag-custom { width:19px; height:14px; }

    /* progress */
    .progress { display:grid; grid-template-columns:repeat(6,minmax(0,1fr)); gap:6px; }
    .step { height:6px; border-radius:999px; background:var(--line); }
    .step.active { background:var(--accent); } .step.done { background:color-mix(in srgb,var(--accent) 55%,var(--line)); }

    /* note pills */
    .note-pill { display:inline-flex; align-items:center; height:26px; padding:0 11px; border-radius:999px; font-size:12px; font-weight:800; border:1px solid var(--line); text-transform:capitalize; }
    .note-pill.sm { height:22px; font-size:11px; padding:0 9px; }
    .note-clean { color:var(--good); background:color-mix(in srgb,var(--good) 10%,transparent); border-color:color-mix(in srgb,var(--good) 28%,var(--line)); }
    .note-fall { color:var(--bad); background:color-mix(in srgb,var(--bad) 10%,transparent); border-color:color-mix(in srgb,var(--bad) 30%,var(--line)); }

  function parseAthletes(csv) {
    const lines = csv.trim().split(/\n+/);
    const headers = lines.shift().split(",");
    return lines.map((line, index) => {
      const cells = line.split(",");
      const row = {};
      headers.forEach((h, i) => { row[h] = cells[i]; });
      const gender = row.Genero === "F" ? "WAG" : "MAG";
      const stats = {};
      APPARATUS[gender].forEach((a) => { stats[a.id] = { d: toNumber(row[`${a.key}_D`]), e: toNumber(row[`${a.key}_E`]) }; });
      return {
        id: `${gender}-${slug(row.Nome)}-${row.Pais}-${row.Ano}-${index}`,

  /* ---------- scoring model with itemized deductions ---------- */
  // ctx.dayForm: forma do dia da sessão (negativo = dia bom); ctx.pressure: 0 a ~0.5
  // (finais, última rotação, entrar logo depois de uma queda da equipe...)
  function buildRoutine(athlete, apparatus, rng, ctx = {}) {
    const dayForm = ctx.dayForm || 0;
    const pressure = Math.max(0, Math.min(0.6, ctx.pressure || 0));
    const stat = athlete.stats[apparatus.id];
    const D = stat.d;
    const typicalDed = Math.max(0.2, round1(10 - stat.e)); // typical execution deductions
    // Curva em sino: variações extremas ficam raras. Pressão empurra levemente para pior;
    // atletas consistentes ("clutch") sofrem menos com ela.
    const clutch = 1 - (athlete.consistency - 0.7) * 1.6; // ~1.0 média, <1 para os mais consistentes
    const dailyForm = gauss(rng) * 0.42 + dayForm + pressure * 0.16 * Math.max(0.35, clutch);
    let targetDed = typicalDed + dailyForm;

    const deductions = [];
    const neutral = [];
    let note = "limpa";

    const nerveFactor = 1 + pressure * Math.max(0.35, clutch);
    const fallChance = (apparatus.risk + (1 - athlete.consistency) * 0.075) * nerveFactor;
    const majorChance = (apparatus.risk * 1.35 + (1 - athlete.consistency) * 0.090) * nerveFactor;
    let major = null;
    if (rng() < fallChance) { major = { code: "fall", value: 1.0 }; note = "queda"; targetDed += 0.4 + rng() * 0.5; }
    else if (rng() < majorChance) { const v = round1(0.3 + rng() * 0.5); major = { code: "majorbreak", value: v }; note = "erro"; }
    else if (rng() < athlete.consistency * 0.12 * (1 - pressure * 0.4)) { note = "cravada"; targetDed = Math.max(0.1, targetDed - (0.15 + rng() * 0.2)); }

    if (major) deductions.push(major);
    let remaining = Math.max(0, round1(targetDed - (major ? major.value : 0)));

    // distribute remaining across execution faults in 0.1 steps
    // Pool ponderado: falhas específicas do aparelho pesam 2×, aterrissagem sempre presente
    // (na vida real, passo no pouso é a dedução mais comum de todas).
    const specific = FAULT_POOL[apparatus.id] || FAULT_POOL.generic;
    const weightedPool = [...specific, ...specific, ...FAULT_POOL.generic, "landstep", "form"];
    let steps = Math.round(remaining * 10);
    const used = {};
    let guard = 0;
    while (steps > 0 && guard < 60) {
      guard++;
      const code = weightedPool[Math.floor(rng() * weightedPool.length)];
      if ((used[code] || 0) >= 5) continue; // no máximo -0.5 por tipo de falha
      const chunk = Math.min(steps, 1 + Math.floor(rng() * 3), 5 - (used[code] || 0)); // 0.1–0.3 per fault
      used[code] = (used[code] || 0) + chunk;
      steps -= chunk;
    }
    Object.keys(used).forEach((code) => deductions.push({ code, value: round1(used[code] / 10) }));

    // neutral deductions (out of bounds / time) mainly on floor & vault landing
    if ((apparatus.id === "fx") && rng() < 0.16) { neutral.push({ code: "nd_bounds", value: rng() < 0.4 ? 0.3 : 0.1 }); note = note === "limpa" ? "linha" : note; }
    if ((apparatus.id === "fx" || apparatus.id === "bb") && rng() < 0.06) neutral.push({ code: "nd_time", value: 0.1 });

    const execDed = round1(deductions.reduce((s, d) => s + d.value, 0));
    let E = round1(Math.max(0, 10 - execDed));
    E = Math.max(4.0, Math.min(10.0, E));
    const neutralDed = round1(neutral.reduce((s, d) => s + d.value, 0));
    const total = round3(D + E - neutralDed);
    // sort deductions: majors first, then by value desc
    deductions.sort((a, b) => (b.code === "fall" ? 1 : 0) - (a.code === "fall" ? 1 : 0) || b.value - a.value);
    return { d: D, e: E, total, note, deductions, neutral, execDed, neutralDed };
  }
  // Back-compat alias
  function simulateRoutine(athlete, apparatus, ctx = {}) { return buildRoutine(athlete, apparatus, state.rng, ctx); }

  function readSetupInputs() {
    const ti = document.getElementById("teamNameInput");
    const fi = document.getElementById("federationInput");
    state.teamName = (ti?.value || state.teamName || "Equipe Fantasy").trim().slice(0, 34) || "Equipe Fantasy";

  function quickStart() {
    readSetupInputs(); state.selectedIds = []; state.draftRound = 1; resetDraftRerolls();

  function startDraft() { readSetupInputs(); state.selectedIds = []; state.draftRound = 1; resetDraftRerolls(); if (isBattleMode()) renderBattleDraft(); else { generateDraftRound(); renderDraftBoard(); } }
  function randomItem(items) { return items[Math.floor(state.rng() * items.length)]; }
  function shuffled(items) {
    // Fisher–Yates com RNG semeado (sort(random) é enviesado e quebra a reprodutibilidade da seed)
    const a = [...items];
    for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(state.rng() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; }
    return a;
  }
  function draftPool(country, year, options = {}) {
    const includeSelected = Boolean(options.includeSelected);
    const selected = selectedBaseKeys();
    return ATHLETES
      .filter((a) => (
        a.gender === state.gender
        && isCountryEligible(a.country)
        && a.country === country
        && a.year === year
        && (includeSelected || !selected.has(a.baseKey))
      ))
      .sort((a, b) => totalPotential(b) - totalPotential(a));
  }
  function availableDraftCombos() {
    const seen = new Set();
    return ATHLETES
      .filter((a) => a.gender === state.gender && isCountryEligible(a.country))
      .map((a) => ({ country: a.country, year: a.year }))
      .filter((combo) => {
        const key = `${combo.country}-${combo.year}`;
        if (seen.has(key)) return false;
        seen.add(key);
        return draftPool(combo.country, combo.year).length > 0;
      });
  }
  function availableYearsForCountry(country) {
    return [...new Set(
      ATHLETES
        .filter((a) => a.gender === state.gender && isCountryEligible(a.country) && a.country === country)
        .map((a) => a.year)
    )].filter((year) => draftPool(country, year).length > 0).sort((a, b) => a - b);
  }
  function availableCountriesForYear(year) {
    return [...new Set(
      ATHLETES
        .filter((a) => a.gender === state.gender && isCountryEligible(a.country) && a.year === year)
        .map((a) => a.country)
    )].filter((country) => draftPool(country, year).length > 0).sort();
  }
  function resetDraftRerolls() {
    state.draftRerolls = { year: false, team: false };
  }
  function hasYearRerollOption(country, year) {
    return availableYearsForCountry(country).some((candidateYear) => candidateYear !== year);
  }
  function hasTeamRerollOption(country, year) {
    return availableCountriesForYear(year).some((candidateCountry) => candidateCountry !== country);
  }
  function yearRerollChoices(country, year) {
    const years = availableYearsForCountry(country).filter((candidateYear) => candidateYear !== year);
    const preserving = years.filter((candidateYear) => state.draftRerolls.team || hasTeamRerollOption(country, candidateYear));
    return preserving.length ? preserving : (state.draftRerolls.team ? years : []);
  }
  function teamRerollChoices(country, year) {
    const countries = availableCountriesForYear(year).filter((candidateCountry) => candidateCountry !== country);
    const preserving = countries.filter((candidateCountry) => state.draftRerolls.year || hasYearRerollOption(candidateCountry, year));
    return preserving.length ? preserving : (state.draftRerolls.year ? countries : []);
  }
  function setDraftDraw(country, year) {
    state.draftDraw = { country, year };
    state.draftOptions = draftPool(country, year, { includeSelected: true });
  }
  function generateDraftRound() {
    const combos = availableDraftCombos();
    const preferred = combos.filter((combo) => {
      const poolSize = draftPool(combo.country, combo.year).length;
      return poolSize > 1 && yearRerollChoices(combo.country, combo.year).length > 0 && teamRerollChoices(combo.country, combo.year).length > 0;
    });
    const secondary = combos.filter((combo) => draftPool(combo.country, combo.year).length > 1);
    const combo = randomItem(preferred.length ? preferred : (secondary.length ? secondary : combos));
    if (!combo) {
      state.draftDraw = null;
      state.draftOptions = [];
      resetDraftRerolls();
      return;
    }
    setDraftDraw(combo.country, combo.year);
  }
  function canRerollYear() {
    if (!state.draftDraw || state.draftRerolls.year || state.selectedIds.length >= 5) return false;
    return yearRerollChoices(state.draftDraw.country, state.draftDraw.year).length > 0;
  }
  function canRerollTeam() {
    if (!state.draftDraw || state.draftRerolls.team || state.selectedIds.length >= 5) return false;
    return teamRerollChoices(state.draftDraw.country, state.draftDraw.year).length > 0;
  }
  function rerollDraftYear() {
    if (!canRerollYear()) return;
    const years = yearRerollChoices(state.draftDraw.country, state.draftDraw.year);
    const preferredYears = years.filter((year) => draftPool(state.draftDraw.country, year).length > 1 && (state.draftRerolls.team || hasTeamRerollOption(state.draftDraw.country, year)));
    const fallbackYears = years.filter((year) => draftPool(state.draftDraw.country, year).length > 1);
    state.draftRerolls.year = true;
    setDraftDraw(state.draftDraw.country, randomItem(preferredYears.length ? preferredYears : (fallbackYears.length ? fallbackYears : years)));
    renderDraftBoard();
  }
  function rerollDraftTeam() {
    if (!canRerollTeam()) return;
    const countries = teamRerollChoices(state.draftDraw.country, state.draftDraw.year);
    const preferredCountries = countries.filter((country) => draftPool(country, state.draftDraw.year).length > 1 && (state.draftRerolls.year || hasYearRerollOption(country, state.draftDraw.year)));
    const fallbackCountries = countries.filter((country) => draftPool(country, state.draftDraw.year).length > 1);
    state.draftRerolls.team = true;
    setDraftDraw(randomItem(preferredCountries.length ? preferredCountries : (fallbackCountries.length ? fallbackCountries : countries)), state.draftDraw.year);
    renderDraftBoard();
  }

    for (let i = 1; i < BATTLE_CONFIG.teamCount; i++) {
      const s = { id: `battle-${i}`, name: `${t("battleDraftTitle")} ${String(i).padStart(2, "0")}`, federation: "BRL", isPlayer: false };
      const roster = [];
      for (let j = 0; j < BATTLE_CONFIG.rosterSize; j++) {
        const source = j % 2 === 0 ? wag : mag;
        const fallback = j % 2 === 0 ? mag : wag;
        const pick = source[(i * 5 + j * 11) % source.length] || fallback[(i * 7 + j * 13) % fallback.length] || pool[(i + j) % pool.length];
        if (pick && !roster.some((a) => a.baseKey === pick.baseKey)) roster.push(pick);

        routines.push({ teamId: team.id, team, athlete: entry.athlete, apparatus: entry.apparatus, score, raw: score.total, points: 0 });
      });
    });
    [...new Set(routines.map((r) => r.apparatus.id))].forEach((appId) => {

  /* ---------- LIVE TEAM FINAL (módulo ao vivo) ---------- */
  function buildTeamFinalData() {
    const finalists = state.results.qual.teamResults.slice(0, 8).map((r) => r.team);
    // lineups per apparatus: top-3 by qual score
    const teamData = finalists.map((team) => {
      const lineups = {};
      apps().forEach((ap) => {
        lineups[ap.id] = [...team.roster].sort((a, b) => b.qualScores[ap.id].total - a.qualScores[ap.id].total).slice(0, 3);
      });
      return { team, lineups, appTotals: {}, total: 0, running: 0 };
    });
    // rotations = one per apparatus. In each rotation, each team performs its 3 counters on that apparatus.
    const dayForms = sessionDayForms(teamData.flatMap((td) => td.team.roster));
    const lastRot = apps().length - 1;
    const rotations = apps().map((ap, rIndex) => {
      const routines = [];
      teamData.forEach((td) => {
        let prev = null; // efeito de momento dentro da equipe na rotação
        td.lineups[ap.id].forEach((athlete, sub) => {
          let pressure = 0.10 + (rIndex === lastRot ? 0.08 : 0); // final; última rotação pesa mais
          let after = null;
          if (prev && prev.score.note === "queda") { pressure += 0.18; after = { kind: "fall", name: prev.athlete.name }; }
          else if (prev && prev.score.note === "cravada") { pressure -= 0.08; after = { kind: "stick", name: prev.athlete.name }; }
          const score = buildRoutine(athlete, ap, state.rng, { dayForm: dayForms[athlete.id], pressure });
          const routine = { teamId: td.team.id, team: td.team, athlete, apparatus: ap, score, sub, after };
          routines.push(routine);
          prev = routine;
        });
      });
      return { apparatus: ap, index: rIndex, routines };
    });
    // precompute appTotals & totals
    teamData.forEach((td) => {
      let total = 0;
      apps().forEach((ap) => {
        const rot = rotations.find((r) => r.apparatus.id === ap.id);
        const scores = rot.routines.filter((x) => x.teamId === td.team.id).map((x) => x.score.total);
        const at = round3(scores.reduce((s, v) => s + v, 0));
        td.appTotals[ap.id] = at; total += at;
      });
      td.total = round3(total);
    });
    return { teamData, rotations };
  }

    setPhase("team", `${icon("live")} ${t("phaseLive")}`);

      rotIndex: 0, routineIndex: -1, // -1 = not started this rotation
      playing: true, speed: 1, timer: null,
      running: {}, log: [], comments: [], done: false, finalCommented: false,
      bestByApp: {}, lastVar: {}
    };
    data.teamData.forEach((td) => { state.live.running[td.team.id] = 0; });
    // abertura da transmissão + primeira rotação

    renderLive();
    scheduleLiveTick(500);
  }
  function liveSpeedMs() { const s = state.live.speed; return s === 2 ? 650 : s === 0.5 ? 2200 : 1250; }
  function scheduleLiveTick(delay) {
    clearTimeout(state.live.timer);
    if (!state.live.playing || state.live.done) return;
    state.live.timer = setTimeout(advanceLive, delay ?? liveSpeedMs());

  function liveRankingData() {
    const L = state.live;
    return [...L.teamData].map((td) => ({ td, val: L.running[td.team.id] || 0 }))
      .sort((a, b) => b.val - a.val)
      .map((row, index) => ({ ...row, rank: index + 1 }));

  function liveTeamRank(teamId) {
    return liveRankingData().find((row) => row.td.team.id === teamId);

    const sp = boothSpeaker(kind);

      meta: extras.meta || "", you: !!extras.you, top: !!extras.top

  function makeRoutineComments(r, prevLeaderId) {
    const s = r.score;
    const L = state.live;
    const rank = liveTeamRank(r.teamId);
    const strongest = strongestDeduction(s);
    const data = {
      name: r.athlete.name,
      team: displayTeamName(r.team),
      app: appName(r.apparatus),
      score: formatScore(s.total),
      fault: strongest ? faultLabel(strongest.code) : t("noDeductions").toLowerCase(),
      value: strongest ? strongest.value.toFixed(1) : "0.0",
      rank: rank ? ordinal(rank.rank) : "",
      d: s.d.toFixed(1), e: s.e.toFixed(3),
      prev: r.after ? r.after.name : ""
    };
    const meta = `${r.team.federation} · ${appName(r.apparatus)} · ${formatScore(s.total)}`;
    const out = [];

    let kind = "steady";
    if (s.note === "cravada") kind = "stick";
    else if (s.note === "queda") kind = "fall";
    else if (s.note === "erro") kind = "error";
    else if (s.neutralDed) kind = "line";
    else if (s.execDed <= 0.4) kind = "clean";
    // resposta logo depois da queda de colega: vira o fio condutor da narração
    if (r.after && r.after.kind === "fall" && (kind === "stick" || kind === "clean" || kind === "steady")) kind = "fallRecovery";

    out.push(boothComment(kind, data, { meta, you: r.team.isPlayer }));

    // segunda voz: leitura técnica nos momentos-chave
    if (kind === "stick") out.push(boothComment("stickAnalysis", data, { meta, you: r.team.isPlayer }));
    else if (kind === "fall") out.push(boothComment("fallAnalysis", data, { meta, you: r.team.isPlayer }));

    // melhor nota do dia no aparelho
    L.bestByApp = L.bestByApp || {};
    const prevBest = L.bestByApp[r.apparatus.id] || 0;
    if (s.total > prevBest) {
      L.bestByApp[r.apparatus.id] = s.total;
      if (prevBest > 0 && s.total >= 13.4 && kind !== "fall") out.push(boothComment("dayBest", data, { meta, top: true, you: r.team.isPlayer }));
    }
    // nota gigante
    if (s.total >= 14.6 && kind !== "stick" && kind !== "fallRecovery") out.push(boothComment("bigScore", data, { meta, top: true, you: r.team.isPlayer }));

    // virada na liderança
    const leaderNow = liveRankingData()[0];
    if (leaderNow && prevLeaderId && leaderNow.td.team.id !== prevLeaderId && leaderNow.td.team.id === r.teamId) {
      out.push(boothComment("leadChange", { team: displayTeamName(r.team) }, { meta: `${r.team.federation} · ${formatScore(leaderNow.val)}`, top: true, you: r.team.isPlayer }));
    }

    // parciais de pódio (com moderação, para não virar spam)
    const topThree = rank && rank.rank <= 3 && (rank.val || 0) > 0;
    if (topThree && r.team.isPlayer && s.total >= 13.6 && kind !== "fall") {
      out.push(boothComment("playerPodium", { rank: ordinal(rank.rank), score: formatScore(s.total) }, { meta, you: true, top: true }));
    } else if (topThree && s.total >= 14.3 && kind === "clean") {

  function advanceLive() {
    const L = state.live;

  function toggleLivePlay() { const L = state.live; if (L.done) return; L.playing = !L.playing; if (L.playing) scheduleLiveTick(200); else clearTimeout(L.timer); updateLive(); }
  function liveNext() { const L = state.live; if (L.done) return; L.playing = false; clearTimeout(L.timer); advanceLive(); }
  function liveSkipRotation() {

  function runAAFinal() {
    setPhase("aa", `${icon("trophy")} ${t("aaButton")}`);
    const dayForms = sessionDayForms(state.results.qual.aaFinalists);
    const results = state.results.qual.aaFinalists.map((a) => {
      let total = 0; let eSum = 0; const scores = {};
      apps().forEach((ap) => { const sc = simulateRoutine(a, ap, { dayForm: dayForms[a.id], pressure: 0.14 }); scores[ap.id] = sc; total += sc.total; eSum += sc.e; });
      return { athlete: a, scores, total: round3(total), eSum: round3(eSum) };
    }).sort((a, b) => b.total - a.total || b.eSum - a.eSum); // desempate FIG: maior execução
    state.results.aaFinal = results; renderAAFinal();
  }
  function renderAAFinal() {
    state.view = "aa"; const results = state.results.aaFinal;
    app.innerHTML = `
      <section class="screen"><div class="grid gap-4">
        <div class="panel p-4 md:p-5">${progress("aa")}
          <div class="mt-5 flex flex-col gap-4 md:flex-row md:items-end md:justify-between">
            <div><p class="kicker">${t("aaFinalKicker")}</p><h1 class="mt-1 display text-2xl md:text-4xl">${t("aaPodium")}</h1></div>
            <button class="btn btn-primary" data-act="appFinals">${icon("arrow")} ${t("appFinalsButton")}</button>
          </div></div>
        <div class="grid gap-4 lg:grid-cols-[420px_1fr]">
          <div class="panel p-4">${renderPodium(results.slice(0, 3).map((r, i) => ({ rank: i + 1, name: r.athlete.name, sub: `${r.athlete.country} · ${athleteTeamName(r.athlete)}`, score: r.total, player: r.athlete.isPlayerAthlete })))}</div>
          <div class="panel p-4">${renderAAFinalTable()}</div>
        </div>
      </div></section>`;
  }
  function renderAAFinalTable() {
    return `<div class="table-wrap tall"><table><thead><tr><th>${t("rank")}</th><th>${t("gymnast")}</th><th>${t("country")}</th>${apparatusHeaderCells()}<th class="num">AA</th><th>${t("medal")}</th></tr></thead><tbody>
      ${state.results.aaFinal.map((r, i) => `<tr class="${r.athlete.isPlayerAthlete ? "player-row" : ""}"><td class="rank">${i + 1}</td><td><div class="strong">${escapeHTML(r.athlete.name)}</div><div class="sub">${escapeHTML(athleteTeamName(r.athlete))}</div></td><td>${countryLabel(r.athlete.country)}</td>${apps().map((ap) => `<td class="score">${formatScore(r.scores[ap.id].total)}</td>`).join("")}<td class="score">${formatScore(r.total)}</td><td>${medalBadge(i)}</td></tr>`).join("")}
    </tbody></table></div>`;
  }

  /* ---------- APPARATUS FINALS ---------- */
  function runAppFinals() {
    setPhase("apps", `${icon("medal")} ${t("phaseApps")}`);
    const finals = {};
    const appFinalAthletes = [...new Set(apps().flatMap((ap) => state.results.qual.appFinalists[ap.id]))];
    const dayForms = sessionDayForms(appFinalAthletes);
    // Final por aparelho: uma série só, pressão máxima — desempate FIG pela nota E
    apps().forEach((ap) => { finals[ap.id] = state.results.qual.appFinalists[ap.id].map((a) => ({ athlete: a, score: simulateRoutine(a, ap, { dayForm: dayForms[a.id], pressure: 0.22 }) })).sort((x, y) => y.score.total - x.score.total || y.score.e - x.score.e); });
    state.results.appFinals = finals; renderAppFinals();
  }
  function renderAppFinals() {
    state.view = "apps";
    app.innerHTML = `
      <section class="screen"><div class="grid gap-4">
        <div class="panel p-4 md:p-5">${progress("apps")}
          <div class="mt-5 flex flex-col gap-4 md:flex-row md:items-end md:justify-between">
            <div><p class="kicker">${t("appFinalsKicker")}</p><h1 class="mt-1 display text-2xl md:text-4xl">${t("appFinalsTitle")}</h1></div>
            <button class="btn btn-primary" data-act="summary">${icon("trophy")} ${t("medalTable")}</button>
          </div></div>
        <div class="grid gap-4 ${state.gender === "MAG" ? "xl:grid-cols-2" : "lg:grid-cols-2"}">${apps().map((ap) => renderAppFinalPanel(ap)).join("")}</div>
      </div></section>`;
  }
  function renderAppFinalPanel(ap) {
    const rows = state.results.appFinals[ap.id];
    return `<section class="panel p-4">
      <div class="mb-4 flex items-center justify-between gap-3"><div class="flex items-center gap-2">${appTag(ap)}<h2 class="section-title">${appName(ap)}</h2></div><span class="chip">${t("final")}</span></div>
      ${renderPodium(rows.slice(0, 3).map((r, i) => ({ rank: i + 1, name: r.athlete.name, sub: `${r.athlete.country} · ${athleteTeamName(r.athlete)}`, score: r.score.total, player: r.athlete.isPlayerAthlete })), true)}
      <div class="mt-4 table-wrap"><table class="min-w-[620px]"><thead><tr><th>${t("rank")}</th><th>${t("gymnast")}</th><th>${t("country")}</th><th class="num">D</th><th class="num">E</th><th class="num">${t("total")}</th><th>${t("routine")}</th><th>${t("medal")}</th></tr></thead><tbody>
        ${rows.map((r, i) => `<tr class="${r.athlete.isPlayerAthlete ? "player-row" : ""}"><td class="rank">${i + 1}</td><td><div class="strong">${escapeHTML(r.athlete.name)}</div><div class="sub">${escapeHTML(athleteTeamName(r.athlete))}</div></td><td>${countryLabel(r.athlete.country)}</td><td class="score">${r.score.d.toFixed(1)}</td><td class="score">${r.score.e.toFixed(3)}</td><td class="score">${formatScore(r.score.total)}</td><td><span class="note-pill sm ${r.score.note === "queda" ? "note-fall" : r.score.note === "erro" ? "note-error" : r.score.note === "cravada" ? "note-stick" : "note-clean"}">${escapeHTML(routineNote(r.score.note))}</span></td><td>${medalBadge(i)}</td></tr>`).join("")}
      </tbody></table></div>
    </section>`;
  }

  function medalBadge(i) {
    if (i > 2) return "";
    const cls = ["medal-gold", "medal-silver", "medal-bronze"];
    return `<span class="medal-badge ${cls[i]}">${i + 1}</span>`;
  }
  function renderPodium(items, compact = false) {
    return `<div class="podium ${compact ? "compact" : ""}">
      ${items.map((item, i) => `<div class="podium-place">
        <div class="podium-name"><span>${escapeHTML(item.name)}</span><span class="podium-sub">${escapeHTML(item.sub)}</span>${item.player ? `<span class="podium-you">${t("yourTeam")}</span>` : ""}</div>
        <div class="podium-block"><span class="podium-medal">${i + 1}</span><span class="podium-score">${formatScore(item.score)}</span></div>
      </div>`).join("")}
    </div>`;
  }

  /* ---------- SUMMARY ---------- */
  function collectMedals() {
    const medals = [];
    if (state.results.teamFinal) state.results.teamFinal.slice(0, 3).forEach((r, i) => medals.push({ typeKey: "teamEvent", event: t("team"), rank: i + 1, owner: displayTeamName(r.team), country: r.team.federation, score: r.total, player: r.team.isPlayer }));
    if (state.results.aaFinal) state.results.aaFinal.slice(0, 3).forEach((r, i) => medals.push({ typeKey: "individualEvent", event: "AA", rank: i + 1, owner: r.athlete.name, country: r.athlete.country, score: r.total, player: r.athlete.isPlayerAthlete }));
    if (state.results.appFinals) apps().forEach((ap) => state.results.appFinals[ap.id].slice(0, 3).forEach((r, i) => medals.push({ typeKey: "apparatusEvent", event: appName(ap), rank: i + 1, owner: r.athlete.name, country: r.athlete.country, score: r.score.total, player: r.athlete.isPlayerAthlete, appId: ap.id })));
    return medals;
  }
  function renderSummary() {
    state.view = "summary"; setPhase("apps", `${icon("trophy")} ${t("phaseMedals")}`);
    const medals = collectMedals();
    const tally = {};
    medals.forEach((m) => {
      tally[m.country] = tally[m.country] || { country: m.country, gold: 0, silver: 0, bronze: 0, total: 0 };
      if (m.rank === 1) tally[m.country].gold += 1;
      if (m.rank === 2) tally[m.country].silver += 1;
      if (m.rank === 3) tally[m.country].bronze += 1;
      tally[m.country].total += 1;
    });
    const rows = Object.values(tally).sort((a, b) => b.gold - a.gold || b.silver - a.silver || b.bronze - a.bronze || a.country.localeCompare(b.country));
    const yours = medals.filter((m) => m.player);
    const haul = [1, 2, 3].map((rk) => yours.filter((m) => m.rank === rk).length);
    const playerFed = state.federation;
    const sessions = [];
    if (state.results.teamFinal) sessions.push({ title: t("phaseTeam"), iconHtml: icon("users"), items: medals.filter((m) => m.typeKey === "teamEvent") });
    if (state.results.aaFinal) sessions.push({ title: t("aaButton"), iconHtml: icon("trophy"), items: medals.filter((m) => m.typeKey === "individualEvent") });
    if (state.results.appFinals) apps().forEach((ap) => sessions.push({ title: appName(ap), iconHtml: appIconSvg(ap.id, 17), items: medals.filter((m) => m.appId === ap.id) }));
    app.innerHTML = `
      <section class="screen"><div class="grid gap-4 lg:grid-cols-[380px_1fr]">
        <div class="panel p-4 md:p-5">${progress("apps")}
          <div class="mt-5"><p class="kicker">${t("competitionEnded")}</p><h1 class="mt-1 display text-3xl md:text-4xl">${t("medalTable")}</h1></div>
          <div class="mt-4 medal-haul"><span class="haul-label">${t("yourMedals")}</span><span class="haul-set"><span class="medal-badge medal-gold">${haul[0]}</span><span class="medal-badge medal-silver">${haul[1]}</span><span class="medal-badge medal-bronze">${haul[2]}</span></span></div>
          <div class="mt-5 tally-head"><span></span><span></span><span class="tally-h medal-h-g">${t("goldShort")}</span><span class="tally-h medal-h-s">${t("silverShort")}</span><span class="tally-h medal-h-b">${t("bronzeShort")}</span><span class="tally-h">${t("total")}</span></div>
          <div class="tally-list">
            ${rows.map((r, i) => `<div class="tally-row ${i === 0 ? "tally-top" : ""} ${r.country === playerFed ? "tally-you" : ""}"><span class="tally-rank">${i + 1}</span><span class="tally-country">${flagHtml(r.country)}<span>${escapeHTML(r.country)}</span></span><span class="tally-num">${r.gold}</span><span class="tally-num">${r.silver}</span><span class="tally-num">${r.bronze}</span><span class="tally-num tally-total">${r.total}</span></div>`).join("")}
          </div>
          <div class="mt-5 grid gap-2"><button class="btn btn-primary" data-act="newSeason">${icon("rotate")} ${t("newSeason")}</button><button class="btn btn-secondary" data-act="backToApps">${icon("arrow")} ${t("backToApps")}</button></div>
        </div>
        <div class="grid content-start gap-4 md:grid-cols-2">
          ${sessions.map((s) => `<section class="panel sess-card">
            <div class="sess-head">${s.iconHtml}<span>${escapeHTML(s.title)}</span></div>
            <div class="sess-list">
              ${s.items.map((m) => `<div class="sess-row ${m.player ? "sess-you" : ""}">${medalBadge(m.rank - 1)}<span class="sess-name">${escapeHTML(m.owner)}</span>${countryLabel(m.country)}<span class="sess-score">${formatScore(m.score)}</span></div>`).join("")}
            </div>
          </section>`).join("")}
        </div>
      </div></section>`;
  }
  function seeTeamResultsFromLive() { commitTeamFinalFromLive(); renderTeamFinal(); }

  /* ---------- event delegation ---------- */
  const ACTIONS = {
    gender: (el) => chooseGender(el.dataset.val),
    competition: (el) => chooseCompetition(el.dataset.val),
    startDraft, quickStart, autoFill: autoFillDraft, prepare: prepareTournament,
    clearDraft, rerollYear: rerollDraftYear, rerollTeam: rerollDraftTeam,
    addAthlete: (el) => addAthlete(el.dataset.id), removeAthlete: (el) => removeAthlete(el.dataset.id),
    battleAuto: autoFillBattleDraft, battleStart: runBattleRoyale, clearBattleDraft,
    addBattleAthlete: (el) => addBattleAthlete(el.dataset.id), removeBattleAthlete: (el) => removeBattleAthlete(el.dataset.id),
    runQuals: runQualifications, backToDraft: renderDraftBoard,
    qualTab: (el) => { state.qualTab = el.dataset.val; renderQualifications(); },
    liveTeamFinal: runLiveTeamFinal, teamFinal: runTeamFinal,
    livePlay: toggleLivePlay, liveNext, liveSkipRot: liveSkipRotation, liveSkipEnd,
    liveSpeed: (el) => setLiveSpeed(Number(el.dataset.val)),
    seeTeamResults: seeTeamResultsFromLive, seeResultsBtn: seeTeamResultsFromLive,
    aaFinal: runAAFinal, appFinals: runAppFinals, summary: renderSummary,
    newSeason: renderSetup, backToApps: renderAppFinals
  };
  function onClick(e) {
    const el = e.target.closest("[data-act]");
    if (!el) return;
    const act = el.dataset.act;
    if (ACTIONS[act]) { e.preventDefault(); ACTIONS[act](el); }
  }
  function onInput(e) {
    if (e.target?.id === "teamNameInput") {
      state.teamName = (e.target.value || "Equipe Fantasy").trim().slice(0, 34) || "Equipe Fantasy";
      persistTeamIdentity();
    }
    if (e.target?.id === "federationInput") {
      state.federation = (e.target.value || "FAN").toUpperCase().replace(/[^A-Z]/g, "").slice(0, 3) || "FAN";
      e.target.value = state.federation;
      persistTeamIdentity();
    }
  }

  /* ---------- boot ---------- */
  function boot() {
    app = document.getElementById("app");
    if (!app) return false;
    if (app.dataset.booted) return true;
    app.dataset.booted = "1";
    document.addEventListener("click", onClick);
    document.addEventListener("input", onInput);
    const brand = document.getElementById("brandHome");
    if (brand) brand.addEventListener("click", renderSetup);
    const themeBtn = document.getElementById("themeButton");
    if (themeBtn) themeBtn.addEventListener("click", toggleTheme);
    const langSel = document.getElementById("languageSelect");
    if (langSel) langSel.addEventListener("change", (e) => setLanguage(e.target.value));
    applyTheme(getInitialTheme());
    if (langSel) langSel.value = state.lang;
    updateChrome();
    renderSetup();
    return true;
  }

  window.GymRoyale = { boot };
})();


document.addEventListener("DOMContentLoaded", function(){ if (window.GymRoyale) window.GymRoyale.boot(); });

</script>
</body>
</html>
