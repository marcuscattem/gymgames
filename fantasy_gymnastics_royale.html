<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GymGames · Simulação Olímpica</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800;900&family=Saira+Condensed:wght@500;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      color-scheme: light;
      --bg:#f2efe6; --bg-2:#e8e2d3; --text:#181b1c; --muted:#5f6669;
      --surface:#fffdf8; --surface-2:#f5f1e6; --surface-3:#efe9da;
      --line:#ddd6c6; --strong-line:#c3b9a4;
      --accent:#0e6d66; --accent-soft:#0e6d661a; --accent-2:#c2410c; --accent-3:#a67c00;
      --good:#15803d; --bad:#b3261e;
      --gold:#c99700; --silver:#98a2ac; --bronze:#b06a2c;
      --shadow:0 20px 60px rgba(58,47,28,.12); --shadow-sm:0 2px 10px rgba(58,47,28,.08);
      --radius:12px; --radius-sm:9px;
      --disp:"Saira Condensed",system-ui,sans-serif;
      --ui:"Archivo",ui-sans-serif,system-ui,sans-serif;
    }
    :root[data-theme="dark"] {
      color-scheme: dark;
      --bg:#0f1211; --bg-2:#141817; --text:#f0ede4; --muted:#a7a293;
      --surface:#1b201e; --surface-2:#222824; --surface-3:#29302b;
      --line:#39403a; --strong-line:#565f57;
      --accent:#37c9b8; --accent-soft:#37c9b826; --accent-2:#fb7b45; --accent-3:#f0c65a;
      --good:#4ade80; --bad:#f6817a;
      --gold:#f0c24e; --silver:#c6ccd4; --bronze:#d08a4a;
      --shadow:0 20px 60px rgba(0,0,0,.32); --shadow-sm:0 2px 10px rgba(0,0,0,.28);
    }
    * { box-sizing:border-box; }
    html { min-width:0; overflow-x:hidden; }
    body { margin:0; min-width:0; min-height:100vh; min-height:100dvh; overflow-x:hidden; background:linear-gradient(180deg,var(--bg),var(--bg-2)); color:var(--text); font-family:var(--ui); -webkit-font-smoothing:antialiased; }
    button,input,select { font:inherit; color:inherit; }
    button { cursor:pointer; }
    button:focus-visible,input:focus-visible,select:focus-visible { outline:3px solid color-mix(in srgb,var(--accent) 45%,transparent); outline-offset:2px; }
    .shell { min-height:100vh; display:flex; flex-direction:column; }

    /* topbar */
    .topbar { position:sticky; top:0; z-index:50; background:color-mix(in srgb,var(--surface) 86%,transparent); border-bottom:1px solid var(--line); backdrop-filter:blur(14px); }
    .brand-mark { width:38px; height:38px; border:1px solid var(--strong-line); border-radius:10px; display:grid; place-items:center; color:var(--accent); background:linear-gradient(135deg,var(--accent-soft),transparent 60%),var(--surface-2); }
    .brand-mark svg { width:23px; height:23px; }
    .brand-title { font-family:var(--disp); font-weight:800; letter-spacing:.01em; }
    .status-pill { min-height:34px; display:inline-flex; align-items:center; gap:8px; border:1px solid var(--line); background:var(--surface-2); border-radius:999px; padding:5px 12px; font-size:13px; font-weight:700; white-space:nowrap; }
    .status-pill svg { width:16px; height:16px; }

    .screen { width:min(1200px,calc(100vw - 24px)); max-width:100%; margin:0 auto; padding:26px 0 max(48px,env(safe-area-inset-bottom)); animation:screen-in 200ms ease-out; }
    @keyframes screen-in { from{transform:translateY(7px);} to{transform:none;} }

    .panel { min-width:0; background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); box-shadow:var(--shadow); }
    .soft-panel { background:color-mix(in srgb,var(--surface) 74%,transparent); border:1px solid var(--line); border-radius:var(--radius); }
    .card { min-width:0; background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); }

    /* type */
    .display { font-family:var(--disp); font-weight:800; line-height:1.02; letter-spacing:.005em; text-wrap:balance; overflow-wrap:anywhere; }
    .kicker { font-size:12px; font-weight:800; letter-spacing:.14em; text-transform:uppercase; color:var(--accent); }
    .section-title { font-family:var(--disp); font-weight:700; font-size:19px; display:flex; align-items:center; gap:8px; }
    .section-title svg { width:18px; height:18px; color:var(--muted); }
    .hint { font-size:14px; font-weight:600; color:var(--muted); }
    .sub { font-size:12px; font-weight:700; color:var(--muted); }
    .strong { font-weight:800; }
    .count-pill { font-family:var(--disp); font-size:15px; color:var(--muted); }

    /* fields */
    .field { display:grid; gap:7px; }
    .field-label { font-size:12.5px; font-weight:800; letter-spacing:.08em; text-transform:uppercase; color:var(--muted); }
    .input { width:100%; min-height:46px; border:1px solid var(--line); border-radius:var(--radius-sm); background:var(--surface); padding:10px 13px; font-weight:600; }
    .language-select { width:auto; min-width:150px; max-width:100%; min-height:42px; border:1px solid var(--line); border-radius:var(--radius-sm); background:var(--surface); padding:8px 12px; font-weight:800; }

    /* buttons */
    .btn { min-width:0; min-height:44px; display:inline-flex; align-items:center; justify-content:center; gap:8px; border-radius:var(--radius-sm); border:1px solid transparent; padding:9px 15px; font-weight:800; letter-spacing:.01em; line-height:1.15; transition:transform .13s ease, background-color .13s ease, border-color .13s ease, box-shadow .13s ease; white-space:normal; text-align:center; }
    .btn svg { width:18px; height:18px; }
    .btn:hover { transform:translateY(-1px); }
    .btn:active { transform:translateY(0); }
    .btn:disabled { cursor:not-allowed; opacity:.5; transform:none; }
    .btn-primary { background:var(--accent); color:#fff; box-shadow:var(--shadow-sm); }
    :root[data-theme="dark"] .btn-primary { color:#04120f; }
    .btn-primary:hover { background:color-mix(in srgb,var(--accent) 88%,#000); }
    .btn-secondary { background:var(--surface-2); border-color:var(--line); }
    .btn-secondary:hover { border-color:var(--strong-line); }
    .btn-danger { background:color-mix(in srgb,var(--bad) 10%,var(--surface)); color:var(--bad); border-color:color-mix(in srgb,var(--bad) 28%,var(--line)); }
    .btn-icon { width:44px; min-width:44px; padding:0; }

    /* segment */
    .segment { min-width:0; display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:8px; padding:6px; background:var(--surface-2); border:1px solid var(--line); border-radius:var(--radius-sm); }
    .segment button { min-width:0; min-height:48px; border-radius:8px; border:1px solid transparent; font-weight:900; color:var(--muted); display:flex; align-items:center; justify-content:center; gap:9px; background:transparent; overflow-wrap:anywhere; }
    .segment button .seg-ico { display:inline-grid; place-items:center; color:currentColor; }
    .segment button.active { background:var(--surface); border-color:var(--strong-line); color:var(--text); box-shadow:var(--shadow-sm); }
    .segment button.active .seg-ico { color:var(--accent); }
    .competition-segment { grid-template-columns:repeat(2,minmax(0,1fr)); }
    .competition-segment button { min-height:54px; padding:8px 10px; white-space:normal; line-height:1.15; }

    /* chips + app icons */
    .chip { min-height:32px; max-width:100%; display:inline-flex; align-items:center; gap:7px; border:1px solid var(--line); background:var(--surface-2); border-radius:999px; padding:5px 12px; font-size:13px; font-weight:700; white-space:normal; overflow-wrap:anywhere; }
    .chip-app { padding-left:6px; }
    .app-icon { width:30px; height:30px; border:1px solid var(--line); border-radius:8px; display:inline-grid; place-items:center; color:var(--accent); background:var(--surface); flex:0 0 auto; }
    .app-icon svg { width:19px; height:19px; }
    .app-icon-sm { width:24px; height:24px; border-radius:7px; } .app-icon-sm svg { width:15px; height:15px; }
    .app-icon-xs { width:20px; height:20px; border-radius:6px; } .app-icon-xs svg { width:13px; height:13px; }

    /* metrics */
    .metric { border:1px solid var(--line); background:var(--surface-2); border-radius:var(--radius-sm); padding:14px; }
    .metric-num { font-family:var(--disp); font-weight:800; font-size:26px; line-height:1; }
    .metric-cap { margin-top:5px; font-size:13px; font-weight:700; color:var(--muted); }
    .metric-app .metric-top { display:flex; align-items:center; justify-content:space-between; gap:8px; }
    .metric-app .metric-cap { margin-top:9px; font-size:12.5px; }
    .metric-sub { margin-top:2px; font-size:11.5px; font-weight:700; color:var(--muted); }

    .score { font-family:var(--disp); font-variant-numeric:tabular-nums; font-weight:800; text-align:right; font-size:15px; }
    .score-lg { font-family:var(--disp); font-variant-numeric:tabular-nums; font-weight:900; font-size:30px; color:var(--accent); }

    /* roster */
    .roster-card { padding:12px; }
    .slot-empty { display:flex; align-items:center; gap:8px; border:1px dashed var(--strong-line); border-radius:var(--radius-sm); padding:13px; font-size:13px; font-weight:700; color:var(--muted); }
    .slot-empty svg { width:15px; height:15px; }
    .roster-mini { border-radius:var(--radius-sm); }
    .confirm-card { display:flex; align-items:center; gap:16px; }
    .confirm-ico { width:52px; height:52px; border-radius:14px; display:grid; place-items:center; background:var(--accent-soft); color:var(--accent); }
    .confirm-ico svg { width:26px; height:26px; }

    /* tables */
    .table-wrap { max-width:100%; overflow:auto; -webkit-overflow-scrolling:touch; overscroll-behavior-x:contain; border:1px solid var(--line); border-radius:var(--radius-sm); background:var(--surface); }
    .table-wrap.tall { max-height:700px; } .table-wrap.mid { max-height:360px; }
    table { width:100%; border-collapse:collapse; min-width:720px; }
    th { position:sticky; top:0; z-index:1; background:var(--surface-2); color:var(--muted); font-size:11px; letter-spacing:.06em; text-transform:uppercase; text-align:left; padding:11px 12px; border-bottom:1px solid var(--line); white-space:nowrap; font-weight:800; }
    th.num, td.num { text-align:right; } th.ctr, td.ctr { text-align:center; }
    .th-app { display:inline-flex; align-items:center; gap:5px; justify-content:flex-end; } .th-app svg { color:var(--accent); }
    td { padding:11px 12px; border-bottom:1px solid var(--line); vertical-align:middle; white-space:nowrap; font-size:14px; }
    tr:last-child td { border-bottom:0; }
    tbody tr:hover { background:color-mix(in srgb,var(--accent) 6%,transparent); }
    td.rank { width:36px; color:var(--muted); font-family:var(--disp); font-weight:800; font-variant-numeric:tabular-nums; }
    .player-row td { background:var(--accent-soft) !important; box-shadow:inset 3px 0 0 var(--accent); }
    .qrow td { background:color-mix(in srgb,var(--good) 6%,transparent); }
    .q-badge { min-width:26px; height:24px; border-radius:999px; display:inline-flex; align-items:center; justify-content:center; font-size:12px; font-weight:900; color:var(--good); background:color-mix(in srgb,var(--good) 12%,transparent); border:1px solid color-mix(in srgb,var(--good) 30%,var(--line)); }
    .medal-h-g { color:var(--gold); } .medal-h-s { color:var(--silver); } .medal-h-b { color:var(--bronze); }

    .medal-badge { min-width:26px; height:26px; border-radius:999px; display:inline-flex; align-items:center; justify-content:center; font-family:var(--disp); font-size:13px; font-weight:900; border:1px solid; box-shadow:inset 0 1.5px 0 rgba(255,255,255,.55), inset 0 -2px 4px rgba(0,0,0,.18), 0 1px 3px rgba(0,0,0,.15); }
    .medal-gold { color:#2e2100; border-color:color-mix(in srgb,var(--gold) 68%,#000); background:radial-gradient(circle at 35% 30%, color-mix(in srgb,var(--gold) 45%,#fff), var(--gold) 62%, color-mix(in srgb,var(--gold) 72%,#000)); }
    .medal-silver { color:#1f2933; border-color:color-mix(in srgb,var(--silver) 68%,#000); background:radial-gradient(circle at 35% 30%, color-mix(in srgb,var(--silver) 45%,#fff), var(--silver) 62%, color-mix(in srgb,var(--silver) 72%,#000)); }
    .medal-bronze { color:#2c1607; border-color:color-mix(in srgb,var(--bronze) 68%,#000); background:radial-gradient(circle at 35% 30%, color-mix(in srgb,var(--bronze) 45%,#fff), var(--bronze) 62%, color-mix(in srgb,var(--bronze) 72%,#000)); }

    /* tabbar */
    .tabbar { display:flex; flex-wrap:wrap; gap:8px; }
    .tabbar button { min-height:40px; border:1px solid var(--line); border-radius:var(--radius-sm); padding:8px 14px; color:var(--muted); font-weight:800; background:var(--surface-2); display:inline-flex; align-items:center; gap:7px; }
    .tabbar button svg { width:16px; height:16px; }
    .tabbar button.active { color:var(--text); border-color:var(--strong-line); background:var(--surface); }
    .tabbar button.active svg { color:var(--accent); }

    /* podium */
    .podium { display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); align-items:end; gap:12px; min-height:270px; }
    .podium-place { display:grid; align-content:end; min-width:0; }
    .podium-name { min-height:56px; display:grid; align-content:end; justify-items:center; text-align:center; font-family:var(--disp); font-weight:800; line-height:1.1; font-size:17px; overflow-wrap:anywhere; }
    .podium-sub { margin-top:3px; font-family:var(--ui); font-size:11.5px; font-weight:700; color:var(--muted); }
    .podium-you { margin-top:3px; font-family:var(--ui); font-size:11px; font-weight:800; color:var(--accent); }
    .podium-block { position:relative; margin-top:26px; border-radius:10px 10px 0 0; display:grid; align-content:end; justify-items:center; gap:2px; padding:10px 8px 13px; min-height:92px; transform-origin:bottom; animation:podium-rise .55s cubic-bezier(.2,.9,.25,1) backwards; box-shadow:inset 0 2px 0 rgba(255,255,255,.45), inset 0 -18px 28px rgba(0,0,0,.14), 0 12px 26px rgba(58,47,28,.16); }
    @keyframes podium-rise { from { transform:scaleY(.25); opacity:0; } to { transform:none; opacity:1; } }
    .podium-medal { position:absolute; top:-19px; left:50%; transform:translateX(-50%); width:38px; height:38px; border-radius:999px; display:grid; place-items:center; font-family:var(--disp); font-weight:900; font-size:17px; border:2px solid; box-shadow:0 5px 12px rgba(0,0,0,.25), inset 0 2px 0 rgba(255,255,255,.55), inset 0 -3px 6px rgba(0,0,0,.2); }
    .podium-score { font-family:var(--disp); font-weight:900; font-variant-numeric:tabular-nums; font-size:22px; line-height:1; }
    .podium-place:nth-child(1){order:2;} .podium-place:nth-child(2){order:1;} .podium-place:nth-child(3){order:3;}
    .podium-place:nth-child(1) .podium-block{ min-height:150px; animation-delay:.28s; color:#2e2100; background:linear-gradient(180deg, color-mix(in srgb,var(--gold) 58%,#fff), var(--gold) 42%, color-mix(in srgb,var(--gold) 72%,#000)); box-shadow:inset 0 2px 0 rgba(255,255,255,.5), inset 0 -18px 28px rgba(0,0,0,.14), 0 12px 26px rgba(58,47,28,.16), 0 0 46px color-mix(in srgb,var(--gold) 32%,transparent); }
    .podium-place:nth-child(2) .podium-block{ min-height:116px; animation-delay:.14s; color:#1f2933; background:linear-gradient(180deg, color-mix(in srgb,var(--silver) 58%,#fff), var(--silver) 42%, color-mix(in srgb,var(--silver) 72%,#000)); }
    .podium-place:nth-child(3) .podium-block{ min-height:96px; color:#2c1607; background:linear-gradient(180deg, color-mix(in srgb,var(--bronze) 58%,#fff), var(--bronze) 42%, color-mix(in srgb,var(--bronze) 72%,#000)); }
    .podium-place:nth-child(1) .podium-medal{ color:#2e2100; border-color:color-mix(in srgb,var(--gold) 62%,#000); background:radial-gradient(circle at 35% 30%, color-mix(in srgb,var(--gold) 45%,#fff), var(--gold) 62%, color-mix(in srgb,var(--gold) 72%,#000)); }
    .podium-place:nth-child(2) .podium-medal{ color:#1f2933; border-color:color-mix(in srgb,var(--silver) 62%,#000); background:radial-gradient(circle at 35% 30%, color-mix(in srgb,var(--silver) 45%,#fff), var(--silver) 62%, color-mix(in srgb,var(--silver) 72%,#000)); }
    .podium-place:nth-child(3) .podium-medal{ color:#2c1607; border-color:color-mix(in srgb,var(--bronze) 62%,#000); background:radial-gradient(circle at 35% 30%, color-mix(in srgb,var(--bronze) 45%,#fff), var(--bronze) 62%, color-mix(in srgb,var(--bronze) 72%,#000)); }
    .podium.compact { min-height:206px; } .podium.compact .podium-name{ font-size:14px; min-height:44px; } .podium.compact .podium-block{ min-height:72px; margin-top:22px; } .podium.compact .podium-medal{ width:32px; height:32px; font-size:14px; top:-16px; } .podium.compact .podium-score{ font-size:18px; } .podium.compact .podium-place:nth-child(1) .podium-block{min-height:108px;} .podium.compact .podium-place:nth-child(2) .podium-block{min-height:88px;}

    /* medal tally + haul */
    .medal-haul { display:flex; align-items:center; justify-content:space-between; gap:10px; padding:11px 13px; border:1px solid color-mix(in srgb,var(--accent) 30%,var(--line)); border-radius:var(--radius-sm); background:var(--accent-soft); }
    .haul-label { font-size:13px; font-weight:800; }
    .haul-set { display:flex; gap:7px; }
    .medal-haul .medal-badge { min-width:30px; height:30px; font-size:14px; }
    .tally-head { display:grid; grid-template-columns:22px 1fr 34px 34px 34px 48px; gap:8px; padding:0 12px; margin-bottom:6px; font-size:11px; font-weight:800; letter-spacing:.06em; text-transform:uppercase; color:var(--muted); }
    .tally-head .tally-h { text-align:center; }
    .tally-list { display:grid; gap:6px; }
    .tally-row { display:grid; grid-template-columns:22px minmax(0,1fr) 34px 34px 34px 48px; align-items:center; gap:8px; padding:10px 12px; border:1px solid var(--line); border-radius:var(--radius-sm); background:var(--surface-2); }
    .tally-rank { font-family:var(--disp); font-weight:900; color:var(--muted); font-variant-numeric:tabular-nums; }
    .tally-country { font-weight:800; font-size:14px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .tally-num { font-family:var(--disp); font-weight:800; font-size:15px; font-variant-numeric:tabular-nums; text-align:center; }
    .tally-total { font-weight:900; }
    .tally-top { border-color:color-mix(in srgb,var(--gold) 55%,var(--line)); background:linear-gradient(90deg,color-mix(in srgb,var(--gold) 16%,transparent),transparent 65%),var(--surface); }
    .tally-top .tally-rank { color:var(--gold); }
    .tally-you { border-color:color-mix(in srgb,var(--accent) 40%,var(--line)); background:var(--accent-soft); box-shadow:inset 3px 0 0 var(--accent); }

    /* medal sessions + flags */
    .sess-card { overflow:hidden; }
    .sess-head { display:flex; align-items:center; gap:8px; padding:11px 14px; border-bottom:1px solid var(--line); background:var(--surface-2); font-family:var(--disp); font-weight:800; font-size:16px; }
    .sess-head svg { width:17px; height:17px; color:var(--accent); flex:0 0 auto; }
    .sess-list { padding:8px; display:grid; gap:4px; }
    .sess-row { display:grid; grid-template-columns:auto minmax(0,1fr) auto auto; align-items:center; gap:10px; padding:8px 10px; border-radius:8px; }
    .battle-routine-row { grid-template-columns:minmax(0,1fr) auto auto auto; }
    .mom-tag { display:inline-block; font-size:10px; font-weight:800; letter-spacing:.03em; padding:1px 6px; border-radius:999px; vertical-align:middle; margin-left:4px; }
    .mom-fire { background:rgba(240,90,60,.18); color:#f0603c; }
    .mom-warm { background:rgba(245,196,81,.20); color:#c99a2e; }
    .mom-shaken { background:rgba(91,141,239,.16); color:#5b8def; }
    .mom-rattled { background:var(--surface-2); color:var(--muted); }
    .ach-row { display:flex; gap:12px; align-items:center; padding:10px 12px; border-radius:12px; border:1px solid var(--line); }
    .ach-row.unlocked { background:linear-gradient(90deg,rgba(245,196,81,.12),transparent); border-color:rgba(245,196,81,.35); }
    .ach-row.locked { opacity:.55; }
    .ach-ic { display:grid; place-items:center; width:38px; height:38px; border-radius:10px; background:var(--surface-2); color:var(--accent); flex:0 0 auto; }
    .ach-row.unlocked .ach-ic { background:rgba(245,196,81,.18); color:#c99a2e; }
    .strategy-segment button { font-size:13px; }
    .sess-row:hover { background:var(--surface-2); }
    .sess-you { background:var(--accent-soft); box-shadow:inset 3px 0 0 var(--accent); }
    .sess-you:hover { background:var(--accent-soft); }
    .sess-name { font-weight:800; font-size:13.5px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .sess-score { font-family:var(--disp); font-weight:800; font-variant-numeric:tabular-nums; font-size:14px; }
    .country-tag { display:inline-flex; align-items:center; gap:6px; font-weight:800; white-space:nowrap; }
    .flag-img { width:21px; height:15px; object-fit:cover; border-radius:3px; border:1px solid var(--line); box-shadow:0 1px 2px rgba(0,0,0,.12); flex:0 0 auto; }
    .flag-custom { display:inline-grid; place-items:center; width:21px; height:15px; border-radius:3px; border:1px solid color-mix(in srgb,var(--accent) 40%,var(--line)); background:var(--accent-soft); color:var(--accent); flex:0 0 auto; }
    .flag-custom svg { width:10px; height:10px; }
    .flag-preview { display:flex; align-items:center; gap:10px; min-height:44px; padding:10px 12px; border:1px solid var(--line); border-radius:8px; background:var(--surface-2); font-weight:900; }
    .flag-preview .flag-img, .flag-preview .flag-custom { width:28px; height:20px; }
    .tally-country { display:inline-flex; align-items:center; gap:7px; }
    .sub-fed { display:inline-flex; align-items:center; gap:6px; }
    .sub-fed .flag-img, .sub-fed .flag-custom { width:18px; height:13px; }
    .stand-fed { display:inline-flex; align-items:center; gap:5px; }
    .stand-fed .flag-img, .stand-fed .flag-custom { width:18px; height:13px; }
    .spot-meta .flag-img, .spot-meta .flag-custom { width:19px; height:14px; }
    .mode-card { border:1px solid var(--line); border-radius:var(--radius-sm); background:var(--surface-2); padding:12px 14px; display:flex; align-items:center; justify-content:space-between; gap:14px; }
    .mode-copy { min-width:0; }
    .mode-title { display:block; font-family:var(--disp); font-weight:900; font-size:16px; }
    .mode-desc { display:block; margin-top:2px; color:var(--muted); font-size:12.5px; font-weight:700; line-height:1.3; }
    .switch { position:relative; display:inline-flex; flex:0 0 auto; width:50px; height:30px; }
    .switch input { position:absolute; opacity:0; inset:0; cursor:pointer; }
    .switch-slider { position:absolute; inset:0; border:1px solid var(--line); border-radius:999px; background:var(--surface); transition:.2s ease; }
    .switch-slider::before { content:""; position:absolute; width:22px; height:22px; left:3px; top:3px; border-radius:999px; background:var(--muted); transition:.2s ease; }
    .switch input:checked + .switch-slider { background:var(--accent); border-color:var(--accent); }
    .switch input:checked + .switch-slider::before { transform:translateX(20px); background:#fff; }

    /* progress */
    .progress { display:grid; grid-template-columns:repeat(6,minmax(0,1fr)); gap:6px; }
    .step { height:6px; border-radius:999px; background:var(--line); }
    .step.active { background:var(--accent); } .step.done { background:color-mix(in srgb,var(--accent) 55%,var(--line)); }

    /* note pills */
    .note-pill { display:inline-flex; align-items:center; height:26px; padding:0 11px; border-radius:999px; font-size:12px; font-weight:800; border:1px solid var(--line); text-transform:capitalize; }
    .note-pill.sm { height:22px; font-size:11px; padding:0 9px; }
    .note-clean { color:var(--good); background:color-mix(in srgb,var(--good) 10%,transparent); border-color:color-mix(in srgb,var(--good) 28%,var(--line)); }
    .note-fall { color:var(--bad); background:color-mix(in srgb,var(--bad) 10%,transparent); border-color:color-mix(in srgb,var(--bad) 30%,var(--line)); }
    .note-error { color:var(--accent-2); background:color-mix(in srgb,var(--accent-2) 10%,transparent); border-color:color-mix(in srgb,var(--accent-2) 30%,var(--line)); }
    .note-stick { color:var(--accent-3); background:color-mix(in srgb,var(--accent-3) 12%,transparent); border-color:color-mix(in srgb,var(--accent-3) 32%,var(--line)); }

    /* ===== LIVE MODULE ===== */
    .live-top { position:relative; overflow:hidden; }
    .live-badge { display:inline-flex; align-items:center; gap:7px; height:34px; padding:0 13px; border-radius:999px; font-family:var(--disp); font-weight:800; font-size:14px; letter-spacing:.06em; text-transform:uppercase; color:#fff; background:var(--bad); box-shadow:0 0 0 0 color-mix(in srgb,var(--bad) 60%,transparent); animation:live-pulse 1.8s ease-out infinite; }
    :root[data-theme="dark"] .live-badge { color:#160404; }
    .live-badge svg { width:16px; height:16px; }
    .live-badge.off { background:var(--strong-line); color:var(--text); animation:none; }
    @keyframes live-pulse { 0%{box-shadow:0 0 0 0 color-mix(in srgb,var(--bad) 55%,transparent);} 70%{box-shadow:0 0 0 12px transparent;} 100%{box-shadow:0 0 0 0 transparent;} }
    .rot-app { display:inline-flex; align-items:center; gap:6px; font-size:16px; color:var(--muted); }
    .rot-app svg { color:var(--accent); }
    .live-controls { display:flex; flex-wrap:wrap; align-items:center; gap:8px; }
    .speed-seg { display:inline-flex; border:1px solid var(--line); border-radius:var(--radius-sm); overflow:hidden; background:var(--surface-2); }
    .speed-seg button { min-height:44px; padding:0 12px; border:0; background:transparent; font-family:var(--disp); font-weight:800; color:var(--muted); }
    .speed-seg button.active { background:var(--accent); color:#fff; }
    :root[data-theme="dark"] .speed-seg button.active { color:#04120f; }

    .spot-panel { min-height:420px; }
    .spot { display:grid; gap:16px; animation:spot-in 260ms ease-out; }
    @keyframes spot-in { from{transform:translateY(8px);} to{transform:none;} }
    .spot-await { min-height:380px; place-content:center; justify-items:center; gap:14px; color:var(--muted); }
    .spot-await-ico { color:var(--strong-line); } .spot-await-txt { font-weight:700; }
    .spot-head { display:flex; align-items:center; justify-content:space-between; }
    .spot-app { display:inline-flex; align-items:center; gap:9px; font-family:var(--disp); font-weight:800; font-size:18px; color:var(--accent); }
    .spot-athlete { display:flex; align-items:center; gap:16px; }
    .spot-avatar { width:60px; height:60px; border-radius:16px; display:grid; place-items:center; background:var(--accent-soft); color:var(--accent); border:1px solid var(--line); flex:0 0 auto; }
    .spot-name { font-size:30px; margin:2px 0; }
    .spot-meta { font-size:13px; font-weight:700; color:var(--muted); display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
    .you-tag { display:inline-flex; height:20px; align-items:center; padding:0 8px; border-radius:999px; font-size:10.5px; font-weight:800; letter-spacing:.06em; text-transform:uppercase; color:var(--accent); background:var(--accent-soft); }
    .spot-scores { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; }
    .sbox { border:1px solid var(--line); border-radius:var(--radius-sm); padding:12px 14px; background:var(--surface-2); display:grid; gap:5px; }
    .sbox-lab { font-size:11px; font-weight:800; letter-spacing:.08em; text-transform:uppercase; color:var(--muted); }
    .sbox-val { font-family:var(--disp); font-weight:900; font-size:27px; font-variant-numeric:tabular-nums; line-height:1; }
    .sbox-total { background:var(--accent); border-color:var(--accent); color:#fff; }
    :root[data-theme="dark"] .sbox-total { color:#04120f; }
    .sbox-total .sbox-lab { color:color-mix(in srgb,#fff 82%,transparent); }
    :root[data-theme="dark"] .sbox-total .sbox-lab { color:color-mix(in srgb,#04120f 70%,transparent); }

    .spot-ded { border:1px solid var(--line); border-radius:var(--radius-sm); background:var(--surface); overflow:hidden; }
    .ded-head { display:flex; align-items:center; justify-content:space-between; gap:10px; padding:11px 14px; background:var(--surface-2); border-bottom:1px solid var(--line); font-weight:800; font-size:13px; }
    .ded-start { font-family:var(--disp); font-weight:700; font-size:13px; color:var(--muted); font-variant-numeric:tabular-nums; }
    .ded-list { list-style:none; margin:0; padding:6px; display:grid; gap:2px; }
    .ded-list li { display:flex; align-items:center; justify-content:space-between; gap:12px; padding:8px 10px; border-radius:8px; font-size:13.5px; font-weight:600; animation:ded-in 220ms ease-out backwards; }
    .ded-list li:nth-child(2){animation-delay:.05s;} .ded-list li:nth-child(3){animation-delay:.1s;} .ded-list li:nth-child(4){animation-delay:.15s;} .ded-list li:nth-child(5){animation-delay:.2s;} .ded-list li:nth-child(6){animation-delay:.25s;}
    @keyframes ded-in { from{transform:translateX(-6px);} to{transform:none;} }
    .ded-list li:hover { background:var(--surface-2); }
    .ded-lab { display:inline-flex; align-items:center; gap:8px; color:var(--text); } .ded-lab svg { width:15px; height:15px; color:var(--muted); }
    .ded-val { font-family:var(--disp); font-weight:800; font-variant-numeric:tabular-nums; color:var(--bad); }
    .ded-major { background:color-mix(in srgb,var(--bad) 8%,transparent); } .ded-major .ded-lab svg { color:var(--bad); } .ded-major .ded-lab { font-weight:800; }
    .ded-neutral .ded-val { color:var(--accent-2); } .ded-neutral .ded-lab svg { color:var(--accent-2); }
    .ded-empty { margin:0; padding:16px 14px; display:flex; align-items:center; gap:9px; font-weight:700; color:var(--good); } .ded-empty svg { width:18px; height:18px; }
    .judge-panel { border-top:1px solid var(--line); padding:10px 12px 12px; display:grid; gap:8px; background:var(--surface); }
    .judge-row { display:flex; align-items:center; justify-content:space-between; gap:10px; flex-wrap:wrap; font-size:12.5px; font-weight:800; color:var(--muted); }
    .judge-scores { display:flex; flex-wrap:wrap; gap:5px; }
    .judge-chip { min-width:48px; padding:4px 7px; border:1px solid var(--line); border-radius:999px; background:var(--surface-2); text-align:center; font-family:var(--disp); font-variant-numeric:tabular-nums; color:var(--text); }
    .judge-chip.drop { opacity:.52; text-decoration:line-through; }
    .judge-avg { font-family:var(--disp); font-variant-numeric:tabular-nums; color:var(--accent); }

    .stand-panel { align-self:start; position:sticky; top:78px; }
    .stand-list { display:grid; gap:5px; }
    .stand-row { display:grid; grid-template-columns:26px minmax(0,1fr) auto auto; align-items:center; gap:10px; padding:10px 11px; border:1px solid var(--line); border-radius:var(--radius-sm); background:var(--surface-2); transition:transform .35s ease, background-color .3s ease; }
    .stand-rank { font-family:var(--disp); font-weight:900; color:var(--muted); text-align:center; }
    .stand-name { font-weight:800; font-size:13.5px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .stand-fed { font-size:11px; font-weight:800; color:var(--muted); }
    .stand-score { font-family:var(--disp); font-weight:900; font-variant-numeric:tabular-nums; font-size:15px; }
    .stand-you { background:var(--accent-soft); border-color:color-mix(in srgb,var(--accent) 40%,var(--line)); box-shadow:inset 3px 0 0 var(--accent); }
    .stand-gold .stand-rank { color:var(--gold); } .stand-gold { border-color:color-mix(in srgb,var(--gold) 55%,var(--line)); }
    .stand-silver .stand-rank { color:var(--silver); }
    .stand-bronze .stand-rank { color:var(--bronze); }

    .log-list { display:grid; gap:4px; max-height:280px; overflow:auto; }
    .log-row { display:grid; grid-template-columns:auto 1fr auto; align-items:center; gap:10px; padding:8px 11px; border-radius:8px; background:var(--surface-2); font-size:13px; animation:ded-in 200ms ease-out; }    .log-fed { font-family:var(--disp); font-weight:900; font-size:12px; color:var(--muted); width:34px; }
    .log-name { font-weight:700; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .log-score { font-family:var(--disp); font-weight:800; font-variant-numeric:tabular-nums; }
    .log-you { background:var(--accent-soft); box-shadow:inset 3px 0 0 var(--accent); }
    .log-empty { color:var(--muted); font-weight:700; margin:0; }

    .commentary-list { display:grid; gap:8px; max-height:292px; overflow:auto; }
    .commentary-card { border:1px solid var(--line); border-radius:10px; background:var(--surface-2); padding:10px 12px; animation:ded-in 200ms ease-out; }
    .commentary-card.you { background:var(--accent-soft); border-color:color-mix(in srgb,var(--accent) 38%,var(--line)); box-shadow:inset 3px 0 0 var(--accent); }
    .commentary-card.top { border-color:color-mix(in srgb,var(--accent-3) 44%,var(--line)); }
    .commentary-meta { display:flex; flex-wrap:wrap; align-items:center; gap:6px; color:var(--muted); font-size:11px; font-weight:900; letter-spacing:.05em; text-transform:uppercase; }
    .commentary-text { margin-top:4px; color:var(--text); font-size:13.5px; font-weight:700; line-height:1.35; }
    .speaker-chip { display:inline-flex; align-items:center; gap:4px; padding:2px 8px; border-radius:999px; background:var(--accent-soft); color:var(--accent); font-size:10px; font-weight:900; letter-spacing:.06em; text-transform:uppercase; }
    .speaker-chip.analyst { background:color-mix(in srgb,var(--accent-3) 16%,transparent); color:var(--accent-3); }
    .commentary-card.from-analyst { border-left:3px solid color-mix(in srgb,var(--accent-3) 55%,var(--line)); }
    .commentary-empty { margin:0; color:var(--muted); font-weight:700; }
    .commentary-ticker { border:1px solid color-mix(in srgb,var(--accent) 34%,var(--line)); border-radius:var(--radius-sm); background:linear-gradient(135deg,var(--accent-soft),var(--surface-2)); padding:12px 14px; box-shadow:inset 3px 0 0 var(--accent); animation:spot-in 220ms ease-out; }
    .commentary-ticker .commentary-meta { color:var(--accent); }
    .commentary-ticker .commentary-text { font-size:15px; margin-top:5px; }

    .arena-art { width:100%; height:auto; display:block; border-radius:var(--radius); border:1px solid var(--line); background:var(--surface-2); }

    /* ===== historical / drawn flags ===== */
    .flag-svg { overflow:hidden; padding:0; background:#fff; }
    .flag-svg svg { display:block; width:100%; height:100%; }

    /* ===== podium — ceremonial ===== */
    .podium-stage { position:relative; }
    .podium-confetti { position:absolute; inset:-14px 0 40px; overflow:hidden; pointer-events:none; z-index:4; }
    .confetti-pc { position:absolute; top:-14px; width:7px; height:11px; border-radius:2px; opacity:0; will-change:transform; animation:confetti-fall 2.6s cubic-bezier(.3,.1,.5,1) forwards; }
    @keyframes confetti-fall { 0%{ transform:translateY(-16px) rotate(0deg); opacity:0; } 10%{ opacity:1; } 100%{ transform:translateY(300px) rotate(600deg); opacity:0; } }
    .podium-flag { width:auto; height:25px; aspect-ratio:3/2; border-radius:4px; border:1px solid rgba(0,0,0,.16); box-shadow:0 2px 7px rgba(0,0,0,.22); object-fit:cover; margin:0 auto 8px; display:block; }
    .podium-flag.flag-svg { display:block; }
    .podium-medal { overflow:hidden; }
    .podium-medal .pm-n { position:relative; z-index:2; }
    .podium-medal::after { content:""; position:absolute; inset:0; border-radius:inherit; background:linear-gradient(115deg,transparent 34%,rgba(255,255,255,.72) 50%,transparent 66%); transform:translateX(-130%); z-index:1; animation:medal-shine 3.4s ease-in-out .8s infinite; }
    @keyframes medal-shine { 0%,58%{ transform:translateX(-130%); } 82%,100%{ transform:translateX(130%); } }
    .podium-place:nth-child(1) .podium-block::before { content:""; position:absolute; inset:-30px -8px auto; height:120px; background:radial-gradient(ellipse at 50% 0, color-mix(in srgb,var(--gold) 42%,transparent), transparent 70%); z-index:-1; pointer-events:none; }
    .podium-rank-lg { position:absolute; bottom:6px; left:50%; transform:translateX(-50%); font-family:var(--disp); font-weight:900; font-size:34px; line-height:1; opacity:.22; letter-spacing:-.02em; }

    /* ===== medal table — leader spotlight + bars ===== */
    .tally-leader { position:relative; display:flex; align-items:center; gap:15px; padding:15px 17px; margin-bottom:14px; border-radius:var(--radius-sm); border:1px solid color-mix(in srgb,var(--gold) 58%,var(--line)); background:linear-gradient(115deg, color-mix(in srgb,var(--gold) 24%,var(--surface)), var(--surface) 62%); box-shadow:var(--shadow-sm); overflow:hidden; }
    .tally-leader::before { content:""; position:absolute; inset:0; background:radial-gradient(circle at 88% -20%, color-mix(in srgb,var(--gold) 30%,transparent), transparent 55%); pointer-events:none; }
    .lead-flag { position:relative; z-index:1; width:auto; height:42px; aspect-ratio:3/2; border-radius:6px; border:1px solid rgba(0,0,0,.16); box-shadow:0 3px 10px rgba(0,0,0,.24); object-fit:cover; flex:0 0 auto; }
    .lead-flag.flag-svg { display:block; }
    .lead-info { position:relative; z-index:1; min-width:0; flex:1; }
    .lead-kicker { font-size:10px; font-weight:900; letter-spacing:.14em; text-transform:uppercase; color:color-mix(in srgb,var(--gold) 72%,var(--text)); }
    .lead-name { font-family:var(--disp); font-weight:800; font-size:21px; line-height:1.02; margin-top:1px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .lead-medals { display:flex; gap:6px; margin-top:6px; }
    .lead-medals .medal-badge { min-width:30px; height:30px; font-size:14px; }
    .tally-row { align-items:center; transition:transform .12s ease, border-color .12s ease; }
    .tally-country { display:flex; flex-direction:column; align-items:stretch; gap:5px; }
    .tally-cty-name { display:inline-flex; align-items:center; gap:8px; font-weight:800; font-size:14px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .tally-cty-name .flag-img { width:24px; height:17px; }
    .tally-bar { width:100%; height:5px; border-radius:999px; background:var(--line); overflow:hidden; display:flex; }
    .tally-bar span { height:100%; display:block; transition:width .5s cubic-bezier(.2,.9,.25,1); }
    .tbar-g { background:linear-gradient(180deg,color-mix(in srgb,var(--gold) 55%,#fff),var(--gold)); }
    .tbar-s { background:linear-gradient(180deg,color-mix(in srgb,var(--silver) 55%,#fff),var(--silver)); }
    .tbar-b { background:linear-gradient(180deg,color-mix(in srgb,var(--bronze) 55%,#fff),var(--bronze)); }

    /* ===== commentary — broadcast booth ===== */
    .commentary-card { display:flex; gap:11px; align-items:flex-start; }
    .cmt-avatar { width:36px; height:36px; border-radius:50%; flex:0 0 auto; display:grid; place-items:center; font-family:var(--disp); font-weight:900; font-size:14px; color:#fff; background:linear-gradient(135deg,color-mix(in srgb,var(--accent) 78%,#fff),var(--accent)); border:2px solid var(--surface); box-shadow:0 2px 6px rgba(0,0,0,.22); text-transform:uppercase; }
    :root[data-theme="dark"] .cmt-avatar { color:#04120f; }
    .cmt-avatar.analyst { background:linear-gradient(135deg,color-mix(in srgb,var(--accent-3) 72%,#fff),var(--accent-3)); }
    .cmt-body { min-width:0; flex:1; }
    .commentary-meta .cmt-role { color:var(--muted); font-weight:800; letter-spacing:.04em; }
    .cmt-livedot { width:7px; height:7px; border-radius:50%; background:var(--bad); box-shadow:0 0 0 0 color-mix(in srgb,var(--bad) 60%,transparent); animation:live-pulse 1.8s ease-out infinite; flex:0 0 auto; }
    .commentary-ticker { display:flex; align-items:center; gap:13px; }
    .ticker-avatar { width:44px; height:44px; font-size:16px; }
    .ticker-body { min-width:0; flex:1; }
    .ticker-live { display:inline-flex; align-items:center; gap:5px; height:20px; padding:0 9px; border-radius:999px; background:var(--bad); color:#fff; font-family:var(--disp); font-weight:800; font-size:10.5px; letter-spacing:.1em; text-transform:uppercase; }
    :root[data-theme="dark"] .ticker-live { color:#160404; }
    .ticker-live .cmt-livedot { background:currentColor; box-shadow:none; }

    /* toast */
    .toast { position:fixed; left:50%; bottom:20px; z-index:100; transform:translateX(-50%) translateY(120%); opacity:0; transition:transform .2s ease, opacity .2s ease; background:var(--text); color:var(--bg); border-radius:10px; padding:11px 16px; font-weight:800; box-shadow:var(--shadow); max-width:min(420px,calc(100vw - 24px)); text-align:center; }
    .toast.show { transform:translateX(-50%) translateY(0); opacity:1; }

    /* achievement toasts */
    .ach-wrap { position:fixed; z-index:120; top:calc(14px + env(safe-area-inset-top)); right:14px; display:flex; flex-direction:column; gap:10px; width:min(340px,calc(100vw - 28px)); pointer-events:none; }
    .ach-card { pointer-events:auto; display:flex; align-items:center; gap:13px; padding:13px 15px; border-radius:14px; background:linear-gradient(140deg,color-mix(in srgb,var(--gold) 22%,var(--surface)),var(--surface) 62%); border:1px solid color-mix(in srgb,var(--gold) 55%,var(--line)); box-shadow:0 16px 40px rgba(58,47,28,.24); transform:translateX(120%); opacity:0; transition:transform .4s cubic-bezier(.2,.9,.3,1.2), opacity .3s ease; }
    .ach-card.show { transform:none; opacity:1; }
    .ach-card.hide { transform:translateX(120%); opacity:0; }
    .ach-medal { flex:0 0 44px; width:44px; height:44px; border-radius:50%; display:grid; place-items:center; color:#3a2f0a; background:radial-gradient(circle at 34% 30%,#ffe9a8,var(--gold) 62%,#b8860b); box-shadow:inset 0 0 0 2px rgba(255,255,255,.45), 0 2px 8px rgba(160,120,0,.35); animation:ach-pop .5s ease-out both; }
    .ach-medal svg { width:23px; height:23px; }
    @keyframes ach-pop { 0%{transform:scale(.3) rotate(-18deg);} 60%{transform:scale(1.12) rotate(6deg);} 100%{transform:none;} }
    .ach-body { min-width:0; display:flex; flex-direction:column; gap:2px; }
    .ach-kicker { font-size:10.5px; font-weight:900; letter-spacing:.13em; text-transform:uppercase; color:color-mix(in srgb,var(--gold) 72%,var(--text)); }

  function icon(name, cls = "") {

  /* ---------- scoring model with itemized deductions ---------- */
  // ctx.dayForm: forma do dia da sessão (negativo = dia bom); ctx.pressure: 0 a ~0.5
  // (finais, última rotação, entrar logo depois de uma queda da equipe...)
  function judgePanelExecution(execDed, athlete, pressure, rng) {
    const center = Math.max(4.0, Math.min(10.0, 10 - execDed));
    const wobble = 0.055 + (1 - (athlete.consistency || 0.82)) * 0.12 + pressure * 0.035;
    const scores = Array.from({ length: 5 }, () => round1(Math.max(4.0, Math.min(10.0, center + gauss(rng) * wobble))));
    const sorted = [...scores].sort((a, b) => a - b);
    const counting = sorted.slice(1, -1);
    return {
      scores,
      droppedLow: sorted[0],
      droppedHigh: sorted[sorted.length - 1],
      counting,
      average: round3(counting.reduce((s, v) => s + v, 0) / counting.length)
    };
  }
  function buildRoutine(athlete, apparatus, rng, ctx = {}) {
    const dayForm = ctx.dayForm || 0;
    const pressure = Math.max(0, Math.min(0.6, ctx.pressure || 0));
    const stat = athlete.stats[apparatus.id];
    const D = scoreValue(stat.d);
    const baseExecution = sampledExecutionBase(stat, rng);
    const typicalDed = Math.max(0.2, round1(10 - baseExecution)); // typical execution deductions
    // Curva em sino: variações extremas ficam raras. Pressão empurra levemente para pior;
    // atletas consistentes ("clutch") sofrem menos com ela.
    const clutch = 1 - (athlete.consistency - 0.7) * 1.6; // ~1.0 média, <1 para os mais consistentes
    const dailyForm = gauss(rng) * 0.42 + dayForm + pressure * 0.16 * Math.max(0.35, clutch);
    let targetDed = typicalDed + dailyForm;

    const deductions = [];
    const neutral = [];
    let note = "limpa";

    const nerveFactor = 1 + pressure * Math.max(0.35, clutch);
    const fallChance = (apparatus.risk + (1 - athlete.consistency) * 0.075) * nerveFactor;
    const majorChance = (apparatus.risk * 1.35 + (1 - athlete.consistency) * 0.090) * nerveFactor;
    let major = null;
    if (rng() < fallChance) { major = { code: "fall", value: 1.0 }; note = "queda"; targetDed += 0.4 + rng() * 0.5; }
    else if (rng() < majorChance) { const v = round1(0.3 + rng() * 0.5); major = { code: "majorbreak", value: v }; note = "erro"; }
    else if (rng() < athlete.consistency * 0.12 * (1 - pressure * 0.4)) { note = "cravada"; targetDed = Math.max(0.1, targetDed - (0.15 + rng() * 0.2)); }

    if (major) deductions.push(major);
    let remaining = Math.max(0, round1(targetDed - (major ? major.value : 0)));

    // distribute remaining across execution faults in 0.1 steps
    // Pool ponderado: falhas específicas do aparelho pesam 2×, aterrissagem sempre presente
    // (na vida real, passo no pouso é a dedução mais comum de todas).
    const specific = FAULT_POOL[apparatus.id] || FAULT_POOL.generic;
    const weightedPool = [...specific, ...specific, ...FAULT_POOL.generic, "landstep", "form"];
    let steps = Math.round(remaining * 10);
    const used = {};
    let guard = 0;
    while (steps > 0 && guard < 60) {
      guard++;
      const code = weightedPool[Math.floor(rng() * weightedPool.length)];
      if ((used[code] || 0) >= 5) continue; // no máximo -0.5 por tipo de falha
      const chunk = Math.min(steps, 1 + Math.floor(rng() * 3), 5 - (used[code] || 0)); // 0.1–0.3 per fault
      used[code] = (used[code] || 0) + chunk;
      steps -= chunk;
    }
    Object.keys(used).forEach((code) => deductions.push({ code, value: round1(used[code] / 10) }));

    // neutral deductions (out of bounds / time) mainly on floor & vault landing
    if ((apparatus.id === "fx") && rng() < 0.16) { neutral.push({ code: "nd_bounds", value: rng() < 0.4 ? 0.3 : 0.1 }); note = note === "limpa" ? "linha" : note; }
    if ((apparatus.id === "fx" || apparatus.id === "bb") && rng() < 0.06) neutral.push({ code: "nd_time", value: 0.1 });

    const execDed = round1(deductions.reduce((s, d) => s + d.value, 0));
    const judgePanel = judgePanelExecution(execDed, athlete, pressure, rng);
    const E = judgePanel.average;
    const neutralDed = round1(neutral.reduce((s, d) => s + d.value, 0));
    const total = round3(D + E - neutralDed);
    // sort deductions: majors first, then by value desc
    deductions.sort((a, b) => (b.code === "fall" ? 1 : 0) - (a.code === "fall" ? 1 : 0) || b.value - a.value);
    return { d: D, e: E, baseExecution, total, note, deductions, neutral, execDed, neutralDed, judgePanel };
  }

  function routineNotePriority(note) {
    return ({ queda: 4, erro: 3, linha: 2, limpa: 1, cravada: 0 })[note] ?? 1;
  }
  function averageRoutineScores(scores) {
    const avg = (key) => round3(scores.reduce((s, sc) => s + scoreValue(sc[key]), 0) / scores.length);
    const note = [...scores].sort((a, b) => routineNotePriority(b.note) - routineNotePriority(a.note))[0]?.note || "limpa";
    return {
      d: avg("d"), e: avg("e"), baseExecution: avg("baseExecution"), total: avg("total"),
      note,
      deductions: scores.flatMap((sc, i) => sc.deductions.map((d) => ({ ...d, vault: i + 1 }))),
      neutral: scores.flatMap((sc, i) => sc.neutral.map((d) => ({ ...d, vault: i + 1 }))),
      execDed: avg("execDed"), neutralDed: avg("neutralDed"),
      judgePanel: { attempts: scores.map((sc) => sc.judgePanel) },

      isAverage: true

        && isCountryEligible(a.country)

      .filter((combo) => {
        const key = `${combo.country}-${combo.year}`;

  function canRerollTeam() {

    const preferredYears = years.filter((year) => draftPool(state.draftDraw.country, year).length > 1 && (state.draftRerolls.team || hasTeamRerollOption(state.draftDraw.country, year)));
    const fallbackYears = years.filter((year) => draftPool(state.draftDraw.country, year).length > 1);
    state.draftRerolls.year = true;
    setDraftDraw(state.draftDraw.country, randomItem(preferredYears.length ? preferredYears : (fallbackYears.length ? fallbackYears : years)));

  function rerollDraftTeam() {

    state.draftRerolls.team = true;
    setDraftDraw(randomItem(preferredCountries.length ? preferredCountries : (fallbackCountries.length ? fallbackCountries : countries)), state.draftDraw.year);

  /* ---------- BATTLE ROYALE LIVRE ---------- */
  function battleDraftPool() {
    return [...ATHLETES].sort((a, b) => athleteTotalPotential(b) - athleteTotalPotential(a));
  }
  function generateBattleOptions() {
    const selected = selectedIdSet();
    state.battleOptions = shuffled(battleDraftPool().filter((a) => !selected.has(a.id))).slice(0, 5);

  function ensureBattleOptions() {
    if (state.selectedIds.length >= BATTLE_CONFIG.rosterSize) {
      state.battleOptions = [];
      return;
    }
    const selected = selectedIdSet();
    state.battleOptions = (state.battleOptions || []).filter((a) => !selected.has(a.id));
    if (!state.battleOptions.length) generateBattleOptions();
  }
  function battleMode() { return BATTLE_MODES.includes(state.battleMode) ? state.battleMode : "royale"; }
  function setBattleMode(mode) {
    if (!BATTLE_MODES.includes(mode)) return;
    state.battleMode = mode;
    state.battleAssignments = {};
    renderBattleDraft();
  }
  function battleModeLabel(mode = battleMode()) { return t("battleMode_" + mode); }
  function battleModeDescription(mode = battleMode()) { return t("battleModeDesc_" + mode); }
  function battleFormatLabel(mode = battleMode()) { return mode === "royale" ? t("battleFormat") : t("battleRelative"); }
  function battleAppById(id) {
    return [...APPARATUS.WAG, ...APPARATUS.MAG].find((ap) => ap.id === id) || APPARATUS.WAG[0];
  }
  function appForAthlete(a, appId) { return athleteApps(a).find((ap) => ap.id === appId) || null; }
  function athleteCanDoApp(a, appId) { return Boolean(appForAthlete(a, appId)); }
  function battleAssignments() {
    if (!state.battleAssignments || typeof state.battleAssignments !== "object") state.battleAssignments = {};
    return state.battleAssignments;
  }
  function pruneBattleAssignments() {
    const assignments = battleAssignments();
    const selected = new Set(state.selectedIds);
    Object.keys(assignments).forEach((key) => {
      if (key.startsWith("app:") && assignments[key] && !selected.has(assignments[key])) delete assignments[key];
      if (key.startsWith("ath:") && !selected.has(key.slice(4))) delete assignments[key];
    });
  }
  function bestEligibleAthleteForApp(athletes, appId) {
    return [...athletes].filter((a) => athleteCanDoApp(a, appId)).sort((a, b) => appPotential(b, appId) - appPotential(a, appId))[0] || null;
  }
  function recommendShowOffAssignments(selected) {
    const existing = battleAssignments();
    const next = {};
    const usedApps = new Set();
    selected.forEach((athlete) => {
      const appId = existing[`ath:${athlete.id}`];
      if (appId && athleteCanDoApp(athlete, appId) && !usedApps.has(appId)) {
        next[`ath:${athlete.id}`] = appId;
        usedApps.add(appId);
      }
    });
    const candidates = [];
    selected.forEach((athlete) => athleteApps(athlete).forEach((ap) => {
      candidates.push({ athlete, appId: ap.id, potential: appPotential(athlete, ap.id) });
    }));
    candidates.sort((a, b) => b.potential - a.potential);
    selected.forEach((athlete) => {
      if (next[`ath:${athlete.id}`]) return;
      const pick = candidates.find((c) => c.athlete.id === athlete.id && !usedApps.has(c.appId));
      if (pick) {
        next[`ath:${athlete.id}`] = pick.appId;
        usedApps.add(pick.appId);
      }
    });
    return next;
  }
  function ensureBattleAssignments(selected = selectedAthletes()) {
    const mode = battleMode();
    const assignments = battleAssignments();
    if (mode === "onePerApp") {
      BATTLE_ONE_PER_APP_IDS.forEach((appId) => {
        const current = selected.find((a) => a.id === assignments[`app:${appId}`] && athleteCanDoApp(a, appId));
        if (!current) {
          const pick = bestEligibleAthleteForApp(selected, appId);
          if (pick) assignments[`app:${appId}`] = pick.id;
          else delete assignments[`app:${appId}`];
        }
      });
    } else if (mode === "showOff") {
      state.battleAssignments = { ...assignments, ...recommendShowOffAssignments(selected) };
    }
  }
  function battleLineupStatus(mode = battleMode(), selected = selectedAthletes()) {
    if (mode === "royale") return { valid: true, missing: [] };
    if (selected.length !== BATTLE_CONFIG.rosterSize) return { valid: false, missing: ["roster"] };
    const assignments = battleAssignments();
    if (mode === "onePerApp") {
      const missing = BATTLE_ONE_PER_APP_IDS.filter((appId) => {
        const id = assignments[`app:${appId}`];
        const athlete = selected.find((a) => a.id === id);
        return !athlete || !athleteCanDoApp(athlete, appId);
      });
      return { valid: missing.length === 0, missing };
    }
    if (mode === "showOff") {
      const used = new Set();
      const missing = [];
      selected.forEach((athlete) => {
        const appId = assignments[`ath:${athlete.id}`];
        if (!appId || !athleteCanDoApp(athlete, appId) || used.has(appId)) missing.push(athlete.id);
        else used.add(appId);
      });
      return { valid: missing.length === 0 && used.size === BATTLE_CONFIG.rosterSize, missing };
    }
    return { valid: false, missing: [] };
  }
  function battleModeControls() {

    if (battleMode() === "onePerApp") {

          const current = assignments[`ath:${athlete.id}`] || "";

                return `<option value="${ap.id}" ${current === ap.id ? "selected" : ""} ${disabled}>${appName(ap)} · ${formatScore(appPotential(athlete, ap.id))}</option>`;
              }).join("")}
            </select></label>`;
        }).join("")}
      </div>
    </div>`;
  }

    const assignments = battleAssignments();
    if (el.dataset.battleAssign === "onePerApp") assignments[`app:${el.dataset.app}`] = el.value;
    if (el.dataset.battleAssign === "showOff") assignments[`ath:${el.dataset.athlete}`] = el.value;

  function battleRosterSlot(a) {

  function renderBattleDraft() {
    state.view = "battleDraft"; setPhase("draft", `${icon("live")} ${t("battleDraftTitle")}`);

    app.innerHTML = `
      <section class="screen">

            <div class="mt-5 flex flex-col gap-4 md:flex-row md:items-end md:justify-between">

              <div class="flex gap-2">
                <button class="btn btn-secondary" data-act="battleAuto">${icon("plus")} ${t("battleAuto")}</button>

  function addBattleAthlete(id) {
    const athlete = athleteById(id);
    if (!athlete || selectedIdSet().has(athlete.id)) return;

    state.selectedIds.push(id);

  function clearBattleDraft() { state.selectedIds = []; state.battleAssignments = {}; generateBattleOptions(); renderBattleDraft(); }

      generateBattleOptions();

      const pick = [...pool].sort((a, b) => athleteTotalPotential(b) - athleteTotalPotential(a))[0];
      if (!pick) break;

  }
  function buildBattleTeams() {
    const shell = { id: "player", name: state.teamName, federation: state.federation, isPlayer: true };
    const playerTeam = { ...shell, roster: selectedAthletes().map((a) => cloneAthlete(a, shell)) };
    const selected = selectedIdSet();
    const pool = shuffled(battleDraftPool().filter((a) => !selected.has(a.id)));
    const wag = pool.filter((a) => a.gender === "WAG");
    const mag = pool.filter((a) => a.gender === "MAG");
    const teams = [playerTeam];
    for (let i = 1; i < BATTLE_CONFIG.teamCount; i++) {
      const s = { id: `battle-${i}`, name: `${t("battleDraftTitle")} ${String(i).padStart(2, "0")}`, federation: "BRL", isPlayer: false };
      const roster = [];
      for (let j = 0; j < BATTLE_CONFIG.rosterSize; j++) {
        const source = j % 2 === 0 ? wag : mag;
        const fallback = j % 2 === 0 ? mag : wag;
        const pick = randomItem(source.filter((a) => !roster.some((p) => p.baseKey === a.baseKey)))
          || randomItem(fallback.filter((a) => !roster.some((p) => p.baseKey === a.baseKey)))
          || randomItem(pool.filter((a) => !roster.some((p) => p.baseKey === a.baseKey)));
        if (pick && !roster.some((a) => a.baseKey === pick.baseKey)) roster.push(pick);
      }
      while (roster.length < BATTLE_CONFIG.rosterSize) {
        const pick = randomItem(pool.filter((a) => !roster.some((p) => p.baseKey === a.baseKey)));

    const teamResults = []; const allAthletes = [];
    const dayForms = sessionDayForms(state.teams.flatMap((tm) => tm.roster));
    state.teams.forEach((team) => {
      const appTotals = {}; let total = 0;
      team.roster.forEach((a) => {
        a.qualScores = {}; a.qualAA = 0;
        apps().forEach((ap) => { const sc = competitionScore(a, ap, { dayForm: dayForms[a.id], twoVaults: ap.id === "vt" }); a.qualScores[ap.id] = sc; a.qualAA += sc.total; });
        a.qualAA = round3(a.qualAA); allAthletes.push(a);
      });
      apps().forEach((ap) => {
        const counted = [...team.roster].map((a) => a.qualScores[ap.id].total).sort((x, y) => y - x).slice(0, 3).reduce((s, v) => s + v, 0);
        appTotals[ap.id] = round3(counted); total += counted;
      });
      teamResults.push({ team, total: round3(total), appTotals });
    });
    teamResults.sort((a, b) => b.total - a.total);
    const aaRanking = [...allAthletes].sort((a, b) => b.qualAA - a.qualAA);
    const aaFinalists = applyTwoPerCountry(aaRanking, 24, (a) => a.country);
    const appRankings = {}; const appFinalists = {};
    apps().forEach((ap) => {
      const ranking = [...allAthletes].sort((a, b) => b.qualScores[ap.id].total - a.qualScores[ap.id].total);
      appRankings[ap.id] = ranking; appFinalists[ap.id] = applyTwoPerCountry(ranking, 8, (a) => a.country);
    });
    state.results.qual = { teamResults, allAthletes, aaRanking, aaFinalists, appRankings, appFinalists };
    state.qualTab = "teams"; renderQualifications();
  }
  function applyTwoPerCountry(ranking, limit, getter) {
    const counts = {}; const out = [];
    for (const item of ranking) {
      const c = getter(item); counts[c] = counts[c] || 0;
      if (counts[c] < 2) { out.push(item); counts[c] += 1; }
      if (out.length === limit) break;
    }
    return out;
  }

  /* ---------- LIVE TEAM FINAL (módulo ao vivo) ---------- */
  function buildTeamFinalData() {
    const finalists = state.results.qual.teamResults.slice(0, 8).map((r) => r.team);
    // lineups per apparatus: top-3 by qual score
    const teamData = finalists.map((team) => {
      const lineups = {};
      apps().forEach((ap) => {
        lineups[ap.id] = [...team.roster].sort((a, b) => b.qualScores[ap.id].total - a.qualScores[ap.id].total).slice(0, 3);
      });
      return { team, lineups, appTotals: {}, total: 0, running: 0 };
    });
    // rotations = one per apparatus. In each rotation, each team performs its 3 counters on that apparatus.
    const dayForms = sessionDayForms(teamData.flatMap((td) => td.team.roster));
    const lastRot = apps().length - 1;
    const rotations = apps().map((ap, rIndex) => {
      const routines = [];
      teamData.forEach((td) => {
        let prev = null; // efeito de momento dentro da equipe na rotação
        td.lineups[ap.id].forEach((athlete, sub) => {
          let pressure = 0.10 + (rIndex === lastRot ? 0.08 : 0); // final; última rotação pesa mais
          let after = null;
          if (prev && prev.score.note === "queda") { pressure += 0.18; after = { kind: "fall", name: prev.athlete.name }; }
          else if (prev && prev.score.note === "cravada") { pressure -= 0.08; after = { kind: "stick", name: prev.athlete.name }; }
          const score = buildRoutine(athlete, ap, state.rng, { dayForm: dayForms[athlete.id], pressure });
          const routine = { teamId: td.team.id, team: td.team, athlete, apparatus: ap, score, sub, after };
          routines.push(routine);
          prev = routine;
        });
      });
      return { apparatus: ap, index: rIndex, routines };
    });
    // precompute appTotals & totals
    teamData.forEach((td) => {
      let total = 0;
      apps().forEach((ap) => {
        const rot = rotations.find((r) => r.apparatus.id === ap.id);
        const scores = rot.routines.filter((x) => x.teamId === td.team.id).map((x) => x.score.total);
        const at = round3(scores.reduce((s, v) => s + v, 0));
        td.appTotals[ap.id] = at; total += at;
      });
      td.total = round3(total);
    });
    return { teamData, rotations };
  }

  function currentLiveTeamData() {

    if (L.scoreMode === "currentApp") {
      const appId = L.rotations[L.rotIndex]?.apparatus?.id;
      return L.teamData.filter((td) => td.apparatusId === appId);

  function resetLiveRunning() {

  function liveValue(r) { return r.liveValue == null ? r.score.total : r.liveValue; }
  function recalculateLiveRunning() {
    const L = state.live;
    if (L.scoreMode !== "top3ByApp") return;
    resetLiveRunning();
    currentLiveTeamData().forEach((td) => {
      const appScores = {};
      L.log.filter((r) => r.teamId === td.team.id).forEach((r) => {
        appScores[r.apparatus.id] = appScores[r.apparatus.id] || [];
        appScores[r.apparatus.id].push(r.score.total);
      });
      L.running[td.team.id] = round3(Object.values(appScores).reduce((sum, scores) => sum + scores.sort((a, b) => b - a).slice(0, 3).reduce((s, v) => s + v, 0), 0));
    });
  }
  function recordLiveRoutine(r) {

    L.log.unshift(r);

  function strongestDeduction(score) {
    return [...score.deductions, ...score.neutral].sort((a, b) => b.value - a.value)[0] || null;

  function judgePanelSpread(score) {
    const panels = score?.judgePanel?.attempts || (score?.judgePanel ? [score.judgePanel] : []);
    return panels.reduce((maxSpread, panel) => {
      const scores = panel?.scores || [];
      if (!scores.length) return maxSpread;
      return Math.max(maxSpread, Math.max(...scores) - Math.min(...scores));
    }, 0);
  }

  function liveSkipRotation() {
    const L = state.live; if (L.done) return; L.playing = false; clearTimeout(L.timer);
    const rot = L.rotations[L.rotIndex];
    const processed = [];
    for (let i = L.routineIndex + 1; i < rot.routines.length; i++) { const r = rot.routines[i]; recordLiveRoutine(r); processed.push(r); }
    addSkipComments(processed);
    L.routineIndex = rot.routines.length - 1;
    if (L.rotIndex + 1 >= L.rotations.length) { finishLive(); } else { L.rotIndex += 1; L.routineIndex = -1; if (L.resetRunningEachRotation) resetLiveRunning(); updateLive(); }
  }
  function liveSkipEnd() {
    const L = state.live; if (L.done) return; clearTimeout(L.timer); L.playing = false;
    const processed = [];
    const startRot = L.rotIndex;
    const startRoutine = L.routineIndex;
    for (let ri = startRot; ri < L.rotations.length; ri++) {
      if (L.resetRunningEachRotation && ri > startRot) { L.rotIndex = ri; resetLiveRunning(); }
      const rot = L.rotations[ri]; const start = ri === startRot ? startRoutine + 1 : 0;
      for (let i = start; i < rot.routines.length; i++) { const r = rot.routines[i]; recordLiveRoutine(r); processed.push(r); }
    }
    addSkipComments(processed);
    L.rotIndex = L.rotations.length - 1; L.routineIndex = L.rotations[L.rotIndex].routines.length - 1;
    finishLive();

    if (high === low) high = scores.findIndex((_, i) => i !== low);
    return new Set([low, high].filter((i) => i >= 0));

  function renderPodium(items, compact = false) {

  function seeResultsFromLive() {
    commitLiveResults();
    if (state.live.mode === "qualifications") renderQualifications();
    else if (state.live.mode === "apparatusFinals") renderAppFinals();
    else if (state.live.mode === "battleRoyale") renderBattleResults();
    else renderTeamFinal();

  /* ---------- event delegation ---------- */
  /* ================= CARREIRA · PERSISTÊNCIA (localStorage) ================= */
  const CAREER_KEY = "gym-royale-career-v1";
  const CAREER_VERSION = 1;
  function blankCareer() {
    return {
      version: CAREER_VERSION,
      created: Date.now(),
      runs: 0,
      totals: { gold: 0, silver: 0, bronze: 0, competitions: 0 },
      best: { teamScore: 0, aaScore: 0, appScore: 0, battleRank: null, battlePoints: 0 },
      byCompetition: {},        // key -> { plays, gold, silver, bronze, bestFinish }
      headToHead: {},           // rivalKey -> { name, wins, losses, meetings, lastResult }
      athletes: {},             // baseKey -> { name, country, apps: {id:{n,sum,best}}, comps, medals, falls, sticks, bestTotal }
      achievements: {},         // id -> unlockedTimestamp
      log: []                   // últimas competições (máx 30)
    };
  }
  function loadCareer() {
    try {
      const raw = localStorage.getItem(CAREER_KEY);
      if (!raw) return blankCareer();
      const parsed = JSON.parse(raw);
      if (!parsed || parsed.version !== CAREER_VERSION) return blankCareer();
      return { ...blankCareer(), ...parsed };
    } catch (_) { return blankCareer(); }
  }
  function saveCareer(c) {
    try { localStorage.setItem(CAREER_KEY, JSON.stringify(c)); } catch (_) { /* quota */ }
  }
  function resetCareer() { saveCareer(blankCareer()); showToast(t("careerReset")); renderCareer(); }

  /* ---------- catálogo de conquistas ---------- */
  const ACHIEVEMENTS = [
    { id: "firstGold", icon: "trophy", test: (r) => r.playerGold >= 1 },
    { id: "cleanSweep", icon: "medal", test: (r) => r.playerGold >= 1 && r.playerSilver >= 1 && r.playerBronze >= 1 },
    { id: "teamGold", icon: "users", test: (r) => r.mode === "classic" && r.teamFinishPlayer === 1 },
    { id: "battleCrown", icon: "bolt", test: (r) => r.mode === "battle" && r.battleRank === 1 },
    { id: "battleNoFall", icon: "bolt", test: (r) => r.mode === "battle" && r.battleRank === 1 && r.playerFalls === 0 },
    { id: "bigScore15", icon: "star", test: (r) => r.playerBestTotal >= 15.0 },
    { id: "monoNation", icon: "flag", test: (r) => r.playerSingleCountry && (r.teamFinishPlayer === 1 || r.battleRank === 1) },
    { id: "eraMix", icon: "clock", test: (r) => r.playerEraSpread >= 20 },
    { id: "veteran10", icon: "trophy", test: (_r, c) => c.totals.competitions >= 10 },
    { id: "goldHoard", icon: "medal", test: (_r, c) => c.totals.gold >= 15 },
    { id: "podiumStreak", icon: "star", test: (_r, c) => (c._streak || 0) >= 3 },
    { id: "hardModeGold", icon: "bolt", test: (r) => r.mode === "classic" && r.traditionalHardMode && r.teamFinishPlayer === 1 },
    { id: "hardModePodium", icon: "medal", test: (r) => r.mode === "classic" && r.traditionalHardMode && r.teamFinishPlayer != null && r.teamFinishPlayer <= 3 },
    { id: "noFallsClassic", icon: "check", test: (r) => r.mode === "classic" && r.playerMedalTotal >= 1 && r.playerFalls === 0 },
    { id: "appGold", icon: "star", test: (r) => r.mode === "classic" && r.playerAppGold >= 1 },
    { id: "aaMedal", icon: "medal", test: (r) => r.mode === "classic" && r.playerAAMedal },
    { id: "giantKiller", icon: "users", test: (r) => r.mode === "classic" && r.h2hWins >= 10 },
    { id: "worldTour", icon: "flag", test: (_r, c) => ["olympics", "panamerican", "european", "asian"].every((key) => (c.byCompetition[key]?.plays || 0) > 0) },
    { id: "battleFinalist", icon: "bolt", test: (r) => r.mode === "battle" && r.battleRank != null && r.battleRank <= 4 }
  ];

  function recordCompetitionResult(runData) {
    const c = loadCareer();
    c.runs += 1;
    c.totals.competitions += 1;
    c.totals.gold += runData.playerGold;
    c.totals.silver += runData.playerSilver;
    c.totals.bronze += runData.playerBronze;

    // por competição
    const compKey = runData.competitionKey;
    const cc = c.byCompetition[compKey] || { plays: 0, gold: 0, silver: 0, bronze: 0, bestFinish: null };
    cc.plays += 1; cc.gold += runData.playerGold; cc.silver += runData.playerSilver; cc.bronze += runData.playerBronze;
    const finish = runData.mode === "battle" ? runData.battleRank : runData.teamFinishPlayer;
    if (finish != null && (cc.bestFinish == null || finish < cc.bestFinish)) cc.bestFinish = finish;
    c.byCompetition[compKey] = cc;

    // melhores marcas
    if (runData.teamScorePlayer > c.best.teamScore) c.best.teamScore = runData.teamScorePlayer;
    if (runData.aaScorePlayer > c.best.aaScore) c.best.aaScore = runData.aaScorePlayer;
    if (runData.appScorePlayer > c.best.appScore) c.best.appScore = runData.appScorePlayer;
    if (runData.mode === "battle") {
      if (c.best.battleRank == null || runData.battleRank < c.best.battleRank) c.best.battleRank = runData.battleRank;
      if (runData.battlePointsPlayer > c.best.battlePoints) c.best.battlePoints = runData.battlePointsPlayer;
    }

    // head-to-head vs rivais (só clássico, onde há federações persistentes)
    (runData.h2h || []).forEach((m) => {
      const h = c.headToHead[m.key] || { name: m.name, wins: 0, losses: 0, meetings: 0, lastResult: "" };
      h.name = m.name; h.meetings += 1;
      if (m.playerWon) h.wins += 1; else h.losses += 1;
      h.lastResult = m.playerWon ? "W" : "L";
      c.headToHead[m.key] = h;
    });

    // estatísticas de carreira dos atletas do jogador
    (runData.athleteStats || []).forEach((s) => {
      const a = c.athletes[s.baseKey] || { name: s.name, country: s.country, apps: {}, comps: 0, medals: 0, falls: 0, sticks: 0, bestTotal: 0 };
      a.name = s.name; a.country = s.country; a.comps += 1;
      a.medals += s.medals || 0; a.falls += s.falls || 0; a.sticks += s.sticks || 0;
      if (s.bestTotal > a.bestTotal) a.bestTotal = s.bestTotal;
      Object.keys(s.apps || {}).forEach((id) => {
        const ap = a.apps[id] || { n: 0, sum: 0, best: 0 };
        ap.n += s.apps[id].n; ap.sum += s.apps[id].sum;
        if (s.apps[id].best > ap.best) ap.best = s.apps[id].best;
        a.apps[id] = ap;
      });
      c.athletes[s.baseKey] = a;
    });

    // streak de pódio (para conquista)
    const onPodium = (finish != null && finish <= 3);
    c._streak = onPodium ? (c._streak || 0) + 1 : 0;

    // conquistas
    const newly = [];
    ACHIEVEMENTS.forEach((ach) => {
      if (c.achievements[ach.id]) return;
      let ok = false;
      try { ok = ach.test(runData, c); } catch (_) { ok = false; }
      if (ok) { c.achievements[ach.id] = Date.now(); newly.push(ach); }
    });

    // log
    c.log.unshift({
      ts: Date.now(), mode: runData.mode, competition: compKey,
      finish, gold: runData.playerGold, silver: runData.playerSilver, bronze: runData.playerBronze,
      teamName: runData.teamName
    });
    c.log = c.log.slice(0, 30);

    saveCareer(c);
    if (newly.length) setTimeout(() => showAchievementToast(newly), 400);
    return { career: c, newly };
  }

  function showAchievementToast(list) {
    const wrap = document.getElementById("achWrap");
    if (!wrap || !list || !list.length) return;
    list.forEach((a, i) => {
      setTimeout(() => {
        const card = document.createElement("div");
        card.className = "ach-card";
        card.innerHTML = `
          <span class="ach-medal">${icon(a.icon || "trophy")}</span>
          <span class="ach-body">
            <span class="ach-kicker">${escapeHTML(t("achievementUnlocked"))}</span>
            <span class="ach-name">${escapeHTML(t("ach_" + a.id + "_name"))}</span>
            <span class="ach-desc">${escapeHTML(t("ach_" + a.id + "_desc"))}</span>
          </span>`;
        wrap.appendChild(card);
        requestAnimationFrame(() => requestAnimationFrame(() => card.classList.add("show")));
        setTimeout(() => {
          card.classList.remove("show"); card.classList.add("hide");
          setTimeout(() => card.remove(), 500);
        }, 4200);
      }, i * 650);
    });
  }

  /* ---------- coleta de dados do jogador ao fim de uma competição clássica ---------- */
  function buildClassicRunData() {
    const medals = collectMedals();
    const player = state.teams.find((tm) => tm.isPlayer);
    const playerFed = state.federation;
    const yours = medals.filter((m) => m.player);
    const g = yours.filter((m) => m.rank === 1).length;
    const s = yours.filter((m) => m.rank === 2).length;
    const b = yours.filter((m) => m.rank === 3).length;
    const playerAppGold = yours.filter((m) => m.typeKey === "apparatusEvent" && m.rank === 1).length;
    const playerAAMedal = yours.some((m) => m.typeKey === "individualEvent" && m.rank <= 3);

    const teamRes = state.results.teamFinal || [];
    const teamFinishPlayer = (() => { const i = teamRes.findIndex((r) => r.team.isPlayer); return i >= 0 ? i + 1 : null; })();
    const teamScorePlayer = (() => { const r = teamRes.find((x) => x.team.isPlayer); return r ? r.total : 0; })();

    const aaRes = state.results.aaFinal || [];
    const aaScorePlayer = aaRes.filter((r) => r.athlete.isPlayerAthlete).reduce((m, r) => Math.max(m, r.total), 0);
    let appScorePlayer = 0;
    if (state.results.appFinals) apps().forEach((ap) => state.results.appFinals[ap.id].forEach((r) => { if (r.athlete.isPlayerAthlete) appScorePlayer = Math.max(appScorePlayer, r.score.total); }));

    // head-to-head: usa a classificatória (sempre inclui o jogador); refina com a final se houver
    const h2h = [];
    const qualRes = (state.results.qual && state.results.qual.teamResults) || [];
    const qualPlayerIdx = qualRes.findIndex((r) => r.team.isPlayer);
    const qualFinishPlayer = qualPlayerIdx >= 0 ? qualPlayerIdx + 1 : null;
    if (qualPlayerIdx >= 0) qualRes.forEach((r, idx) => {
      if (r.team.isPlayer) return;
      h2h.push({ key: `fed:${r.team.federation}:${displayTeamName(r.team)}`, name: displayTeamName(r.team), playerWon: idx > qualPlayerIdx });
    });
    else if (teamFinishPlayer != null) teamRes.forEach((r, idx) => {
      if (r.team.isPlayer) return;
      h2h.push({ key: `fed:${r.team.federation}:${displayTeamName(r.team)}`, name: displayTeamName(r.team), playerWon: (idx + 1) > teamFinishPlayer });
    });

    // stats por atleta do jogador
    const roster = player ? player.roster : [];
    const athleteStats = roster.map((ath) => {
      const apps2 = {}; let falls = 0, sticks = 0, bestTotal = 0, mcount = 0;
      const collect = (score, appId) => {
        if (!score) return;
        apps2[appId] = apps2[appId] || { n: 0, sum: 0, best: 0 };
        apps2[appId].n += 1; apps2[appId].sum += score.total;
        if (score.total > apps2[appId].best) apps2[appId].best = score.total;
        if (score.total > bestTotal) bestTotal = score.total;
        if (score.note === "queda") falls += 1;
        if (score.note === "cravada") sticks += 1;
      };
      // qualification scores (sempre disponíveis para o time do jogador)
      if (ath.qualScores) Object.keys(ath.qualScores).forEach((appId) => collect(ath.qualScores[appId], appId));
      // team final lineups
      const tr = teamRes.find((x) => x.team.isPlayer);
      if (tr && tr.lineups) Object.keys(tr.lineups).forEach((appId) => tr.lineups[appId].forEach((e) => { if (e.athlete.baseKey === ath.baseKey) collect(e.score, appId); }));
      // all-around final
      aaRes.filter((r) => r.athlete.baseKey === ath.baseKey).forEach((r) => apps().forEach((ap) => collect(r.scores[ap.id], ap.id)));
      // apparatus finals
      if (state.results.appFinals) apps().forEach((ap) => state.results.appFinals[ap.id].forEach((r) => { if (r.athlete.baseKey === ath.baseKey) collect(r.score, ap.id); }));
      // medals count for this athlete
      medals.forEach((m) => { if (m.player && m.owner === ath.name) mcount += 1; });
      return { baseKey: ath.baseKey, name: ath.name, country: ath.country, apps: apps2, falls, sticks, bestTotal, medals: mcount };
    });

    const years = roster.map((a) => a.year).filter(Boolean);
    const eraSpread = years.length ? Math.max(...years) - Math.min(...years) : 0;
    const countries = new Set(roster.map((a) => a.country));

    return {
      mode: "classic", competitionKey: state.competition, teamName: state.teamName,
      traditionalHardMode: state.hardMode,
      playerGold: g, playerSilver: s, playerBronze: b,
      playerMedalTotal: yours.length, playerAppGold, playerAAMedal,
      teamFinishPlayer, teamScorePlayer, aaScorePlayer, appScorePlayer,
      qualFinishPlayer, h2hWins: h2h.filter((m) => m.playerWon).length,
      battleRank: null, battlePointsPlayer: 0,
      playerBestTotal: Math.max(teamScorePlayer ? 0 : 0, aaScorePlayer, appScorePlayer, ...athleteStats.map((s2) => s2.bestTotal), 0),
      playerFalls: athleteStats.reduce((n, s2) => n + s2.falls, 0),
      playerSingleCountry: countries.size === 1,
      playerEraSpread: eraSpread,
      h2h, athleteStats
    };
  }

  /* ---------- coleta de dados do jogador ao fim de um Battle Royale ---------- */
  function buildBattleRunData() {
    const battle = state.results.battle;
    const stages = battle.stages;
    const finalStage = stages[stages.length - 1];
    const playerFinalRow = finalStage.rows.find((r) => r.team.isPlayer);
    // rank global do jogador: se sobreviveu à final usa o rank da final; senão o rank no estágio em que caiu
    let battleRank = null, eliminatedAt = null;
    for (let i = 0; i < stages.length; i++) {
      const row = stages[i].rows.find((r) => r.team.isPlayer);
      if (!row) break;
      battleRank = row.rank;
      if (row.rank > stages[i].advance) { eliminatedAt = i; break; }
      if (i === stages.length - 1) eliminatedAt = null;
    }
    const isChampion = battle.champion.team.isPlayer;
    const g = isChampion ? 1 : 0;

    // stats dos atletas do jogador ao longo dos estágios
    const statMap = {};
    let playerFalls = 0, bestTotal = 0, battlePointsPlayer = 0;
    stages.forEach((stage) => {
      const prow = stage.rows.find((r) => r.team.isPlayer);
      if (prow) battlePointsPlayer = Math.max(battlePointsPlayer, prow.points);
      stage.routines.filter((r) => r.team.isPlayer).forEach((r) => {
        const bk = r.athlete.baseKey;
        statMap[bk] = statMap[bk] || { baseKey: bk, name: r.athlete.name, country: r.athlete.country, apps: {}, falls: 0, sticks: 0, bestTotal: 0, medals: isChampion ? 1 : 0 };
        const ap = statMap[bk].apps[r.apparatus.id] || { n: 0, sum: 0, best: 0 };
        ap.n += 1; ap.sum += r.score.total; if (r.score.total > ap.best) ap.best = r.score.total;
        statMap[bk].apps[r.apparatus.id] = ap;
        if (r.score.note === "queda") { statMap[bk].falls += 1; playerFalls += 1; }
        if (r.score.note === "cravada") statMap[bk].sticks += 1;
        if (r.score.total > statMap[bk].bestTotal) statMap[bk].bestTotal = r.score.total;
        if (r.score.total > bestTotal) bestTotal = r.score.total;
      });
    });
    const athleteStats = Object.values(statMap);
    const player = state.teams && state.teams.find ? null : null; // teams não persistem no battle; usa roster selecionado
    const roster = selectedAthletes();
    const years = roster.map((a) => a.year).filter(Boolean);
    const eraSpread = years.length ? Math.max(...years) - Math.min(...years) : 0;
    const countries = new Set(roster.map((a) => a.country));

    return {
      mode: "battle", competitionKey: "battleRoyale", teamName: state.teamName,
      playerGold: g, playerSilver: 0, playerBronze: 0,
      teamFinishPlayer: null, teamScorePlayer: 0, aaScorePlayer: 0, appScorePlayer: 0,
      battleRank, battlePointsPlayer,
      playerBestTotal: bestTotal, playerFalls,
      playerSingleCountry: countries.size === 1,
      playerEraSpread: eraSpread,
      h2h: [], athleteStats
    };
  }
