  function escapeXml(s) { return String(s == null ? "" : s).replace(/[<>&"']/g, (c) => ({ "<": "&lt;", ">": "&gt;", "&": "&amp;", '"': "&quot;", "'": "&apos;" }[c])); }

  function pngBlobFromSvg(svg, aspect = cardAspect()) {
    return new Promise((resolve, reject) => {
      const scale = 2;
      const { w: W, h: H } = cardSize(aspect);
      const img = new Image();
      const blob = new Blob([svg], { type: "image/svg+xml;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      img.onload = () => {
        const canvas = document.createElement("canvas");
        canvas.width = W * scale; canvas.height = H * scale;
        const ctx = canvas.getContext("2d");
        ctx.scale(scale, scale);
        ctx.drawImage(img, 0, 0, W, H);
        URL.revokeObjectURL(url);
        canvas.toBlob((png) => png ? resolve(png) : reject(new Error("png")), "image/png");
      };
      img.onerror = () => { URL.revokeObjectURL(url); reject(new Error("svg")); };
      img.src = url;
    });
  }
  function downloadPngBlob(blob, filename) {
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = filename;
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(() => URL.revokeObjectURL(a.href), 4000);
  }
  async function downloadCardFromSvg(svg, filename, aspect = cardAspect()) {
    try {
      const png = await pngBlobFromSvg(svg, aspect);
      downloadPngBlob(png, filename);
      showToast(t("cardSaved"));
    } catch (_) {
      showToast(t("cardError"));
    }
  }
  async function shareCardFromSvg(svg, filename, aspect = cardAspect()) {
    try {
      const png = await pngBlobFromSvg(svg, aspect);
      const file = typeof File !== "undefined" ? new File([png], filename, { type: "image/png" }) : null;
      if (file && navigator.share && (!navigator.canShare || navigator.canShare({ files: [file] }))) {
        await navigator.share({ title: "GymGames", text: "GymGames", files: [file] });
        return;
      }
      downloadPngBlob(png, filename);
      showToast(t("shareFallback"));
    } catch (_) {
      showToast(t("cardError"));
    }
  }

  /* ================= BATTLE ROYALE · MELHORIAS ================= */
  // Estratégia de escalação do jogador (trade-off de especialização)
  const BATTLE_STRATEGIES = ["balanced", "specialists", "aggressive"];
  function battleStrategy() { return state.battleStrategy || "balanced"; }
  function setBattleStrategy(s) { if (BATTLE_STRATEGIES.includes(s)) { state.battleStrategy = s; renderBattleDraft(); } }

  // momentum individual acumulado entre estágios: cravadas geram "embalo", quedas "abalam"
  function updateBattleMomentum(momentum, routine) {
    const bk = routine.athlete.baseKey;
    const cur = momentum[bk] || 0;
    let delta = 0;
    if (routine.score.note === "cravada") delta = +1;
    else if (routine.score.note === "queda") delta = -2;
    else if (routine.score.note === "erro") delta = -1;
    else if (routine.score.total >= 14.0) delta = +0.5;
    momentum[bk] = Math.max(-3, Math.min(3, cur * 0.6 + delta));
  }
  function momentumPressureBonus(momentum, athlete) {
    const m = momentum[athlete.baseKey] || 0;
    // embalo reduz pressão efetiva, abalo aumenta
    return -m * 0.03;
  }
  function momentumTag(m) {
    if (m >= 2) return { key: "onFire", cls: "mom-fire" };
    if (m >= 1) return { key: "warm", cls: "mom-warm" };
    if (m <= -2) return { key: "shaken", cls: "mom-shaken" };
    if (m <= -1) return { key: "rattled", cls: "mom-rattled" };
    return null;
  }

  const ACTIONS = {
    gender: (el) => chooseGender(el.dataset.val),
    competition: (el) => chooseCompetition(el.dataset.val),
    startDraft, quickStart, autoFill: autoFillDraft, prepare: prepareTournament,
    clearDraft, rerollYear: rerollDraftYear, rerollTeam: rerollDraftTeam,
    addAthlete: (el) => addAthlete(el.dataset.id), removeAthlete: (el) => removeAthlete(el.dataset.id),
    battleAuto: autoFillBattleDraft, battleStart: runBattleRoyale, battleLiveStart: runLiveBattleRoyale, clearBattleDraft,
    battleRerollOptions: () => { generateBattleOptions(); renderBattleDraft(); },
    addBattleAthlete: (el) => addBattleAthlete(el.dataset.id), removeBattleAthlete: (el) => removeBattleAthlete(el.dataset.id),
    runQuals: runQualifications, liveQuals: runLiveQualifications, backToDraft: renderDraftBoard,
    qualTab: (el) => { state.qualTab = el.dataset.val; renderQualifications(); },
    liveTeamFinal: runLiveTeamFinal, teamFinal: runTeamFinal,
    livePlay: toggleLivePlay, liveNext, liveSkipRot: liveSkipRotation, liveSkipEnd,
    liveSpeed: (el) => setLiveSpeed(Number(el.dataset.val)),
    seeTeamResults: seeResultsFromLive, seeResultsBtn: seeResultsFromLive,
    aaFinal: runAAFinal, appFinals: runAppFinals, liveAppFinals: runLiveAppFinals, summary: renderSummary,
    newSeason: renderSetup, backToApps: renderAppFinals,
    battleStrategy: (el) => setBattleStrategy(el.dataset.val),
    battleMode: (el) => setBattleMode(el.dataset.val),
    cardAspect: (el) => setCardAspect(el.dataset.val),
    openCareer: renderCareer, backToSetup: renderSetup, resetCareer,
    exportSummaryCard: exportSummaryCard, exportBattleCard: exportBattleCard,
    shareSummaryCard: shareSummaryCard, shareBattleCard: shareBattleCard,
    uploadFlag: () => document.getElementById("customFlagInput")?.click(),
    clearFlag: () => { state.customFlag = ""; persistTeamIdentity(); renderSetup(); }
  };
  function onClick(e) {
    const el = e.target.closest("[data-act]");
    if (!el) return;
    const act = el.dataset.act;
    if (ACTIONS[act]) { e.preventDefault(); ACTIONS[act](el); }
  }
  function onInput(e) {
    if (e.target?.id === "teamNameInput") {
      state.teamName = (e.target.value || "Equipe Fantasy").trim().slice(0, 34) || "Equipe Fantasy";
      persistTeamIdentity();
    }
    if (e.target?.id === "federationInput") {
      state.federation = (e.target.value || "FAN").toUpperCase().replace(/[^A-Z]/g, "").slice(0, 3) || "FAN";
      e.target.value = state.federation;
      state.customFlag = "";
      persistTeamIdentity();
      renderSetup();
    }
  }
  function onChange(e) {
    const battleAssignment = e.target?.closest?.(".battle-assignment-select");
    if (battleAssignment) {
      updateBattleAssignment(battleAssignment);
      return;
    }
    if (e.target?.id === "federationInput") {
      state.federation = (e.target.value || "FAN").toUpperCase().replace(/[^A-Z]/g, "").slice(0, 3) || "FAN";
      state.customFlag = "";
      persistTeamIdentity();
      renderSetup();
    }
    if (e.target?.id === "hardModeInput") {
      state.hardMode = !!e.target.checked;
      localStorage.setItem("gym-royale-hard-mode", state.hardMode ? "1" : "0");
      renderSetup();
    }
    if (e.target?.id === "customFlagInput") {
      const file = e.target.files && e.target.files[0];
      if (!file) return;
      if (file.size > 650000) { showToast(t("flagTooLarge")); e.target.value = ""; return; }
      const reader = new FileReader();
      reader.onload = () => {
        state.customFlag = String(reader.result || "");
        persistTeamIdentity();
        renderSetup();
      };
      reader.readAsDataURL(file);
    }
  }
  function updateDeviceProfile() {
    const w = window.innerWidth || document.documentElement.clientWidth || 1024;
    const h = window.innerHeight || document.documentElement.clientHeight || 768;
    const coarse = window.matchMedia?.("(pointer: coarse)")?.matches;
    const device = w <= 640 ? "mobile" : (w <= 1024 || coarse ? "tablet" : "desktop");
    document.documentElement.dataset.device = device;
    document.documentElement.dataset.orientation = w >= h ? "landscape" : "portrait";
    document.documentElement.dataset.compact = w <= 820 || h <= 620 ? "true" : "false";
  }

  /* ---------- boot ---------- */
  function boot() {
    app = document.getElementById("app");
    if (!app) return false;
    if (app.dataset.booted) return true;
    app.dataset.booted = "1";
    updateDeviceProfile();
    document.addEventListener("click", onClick);
    document.addEventListener("input", onInput);
    document.addEventListener("change", onChange);
    window.addEventListener("resize", updateDeviceProfile, { passive: true });
    window.addEventListener("orientationchange", () => setTimeout(updateDeviceProfile, 120), { passive: true });
    const brand = document.getElementById("brandHome");
    if (brand) brand.addEventListener("click", renderSetup);
    const themeBtn = document.getElementById("themeButton");
    if (themeBtn) themeBtn.addEventListener("click", toggleTheme);
    const langSel = document.getElementById("languageSelect");
    if (langSel) langSel.addEventListener("change", (e) => setLanguage(e.target.value));
    applyTheme(getInitialTheme());
    if (langSel) langSel.value = state.lang;
    updateChrome();
    renderSetup();
    return true;
  }

  window.GymRoyale = { boot };
})();


document.addEventListener("DOMContentLoaded", function(){ if (window.GymRoyale) window.GymRoyale.boot(); });

</script>
</body>
</html>
